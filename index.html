<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HanAnim Fantasia - 2500+ Anime Royale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0618;
  --bg2:#1a0f2e;
  --card:#1f1535;
  --card2:#2a1d47;
  --text:#e8dcc6;
  --text2:#b8a888;
  --gold:#d4af37;
  --gold2:#f4e4c1;
  --royal:#6b4ce6;
  --royal2:#9d7ff5;
  --accent:#c9a961;
  --glow:rgba(212,175,55,.3);
}
body.light{
  --bg:#f5f0e8;
  --bg2:#e8dfd0;
  --card:#fff9f0;
  --card2:#f0e6d8;
  --text:#2d2416;
  --text2:#5a4d3a;
  --gold:#b8941f;
  --gold2:#d4af37;
  --royal:#5a3fc7;
  --royal2:#7b5fe6;
  --accent:#a88a4a;
  --glow:rgba(184,148,31,.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--text);
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
  transition:.3s;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="a" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="%23d4af37" opacity="0.1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23a)"/></svg>');
  pointer-events:none;
  z-index:0;
}
.header{
  background:linear-gradient(135deg,var(--royal) 0%,var(--royal2) 100%);
  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px var(--glow);
  border-bottom:2px solid var(--gold);
}
.header h1{
  font-family:'Cinzel',serif;
  color:var(--gold2);
  font-size:28px;
  font-weight:800;
  letter-spacing:3px;
  text-shadow:0 0 20px var(--glow),0 2px 4px rgba(0,0,0,.5);
}
.loading{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999
}
.loading h3{
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:24px;
  letter-spacing:2px;
  margin-bottom:20px;
  text-shadow:0 0 15px var(--glow);
}
.progress-bar{
  width:280px;height:6px;
  background:var(--card2);
  border-radius:10px;
  overflow:hidden;
  margin:12px 0;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.3);
  border:1px solid var(--gold);
}
.progress{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
  width:0%;
  transition:.2s;
  box-shadow:0 0 10px var(--glow);
}
.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:15px;
  max-width:1400px;
  margin:0 auto;
  position:relative;
  z-index:1;
}
.filter-box label{
  display:block;
  font-size:11px;
  color:var(--gold);
  margin-bottom:4px;
  font-weight:600;
  font-family:'Cinzel',serif;
  letter-spacing:1px;
  text-transform:uppercase;
}
.filter-box input,.filter-box select{
  width:100%;
  padding:11px;
  background:var(--card);
  border:1px solid var(--accent);
  color:var(--text);
  border-radius:8px;
  outline:none;
  font-size:13px;
  font-family:'Cormorant Garamond',serif;
  transition:.2s;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.2);
}
.filter-box input:focus,.filter-box select:focus{
  border-color:var(--gold);
  box-shadow:0 0 15px var(--glow),inset 0 2px 4px rgba(0,0,0,.2);
}
.anime-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
  max-width:1400px;
  margin:0 auto;
  content-visibility:auto;
  position:relative;
  z-index:1;
}
.card{
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  contain:layout style paint;
  border:1px solid var(--accent);
  transition:.3s;
  box-shadow:0 4px 15px rgba(0,0,0,.4);
}
.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 8px 25px var(--glow),0 0 20px var(--glow);
  border-color:var(--gold);
}
.card-img-wrapper{position:relative;width:100%;height:220px}
.card-img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:var(--bg2);
  transition:.4s;
}
.card:hover.card-img{transform:scale(1.05);filter:brightness(1.1)}
.trailer-preview{
  position:absolute;
  top:0;left:0;
  width:100%;height:220px;
  background:#000;
  display:none;
  box-shadow:inset 0 0 20px var(--glow);
}
.trailer-preview iframe{pointer-events:none}
.card-body{
  padding:10px;
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.3) 100%);
}
.card-title{
  font-size:12px;
  font-weight:600;
  margin-bottom:5px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-height:1.3;
  height:30px;
  color:var(--gold2);
  font-family:'Cinzel',serif;
  letter-spacing:.5px;
}
.card-info{
  font-size:10px;
  opacity:.8;
  margin-bottom:6px;
  color:var(--text2);
}
.card-genres{display:flex;flex-wrap:wrap;gap:3px}
.genre-tag{
  background:linear-gradient(135deg,var(--royal),var(--royal2));
  color:var(--gold2);
  padding:2px 6px;
  border-radius:4px;
  font-size:9px;
  font-family:'Cinzel',serif;
  border:1px solid var(--gold);
  letter-spacing:.5px;
}
.fav-btn{
  position:absolute;
  top:8px;right:8px;
  background:linear-gradient(135deg,rgba(0,0,0,.8),rgba(0,0,0,.6));
  border:2px solid var(--gold);
  border-radius:50%;
  width:30px;height:30px;
  font-size:15px;
  cursor:pointer;
  z-index:2;
  transition:.2s;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.fav-btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px var(--glow);
}
.theme-toggle{
  position:fixed;
  top:12px;left:12px;
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:2px solid var(--gold);
  border-radius:50%;
  width:42px;height:42px;
  cursor:pointer;
  z-index:101;
  font-size:18px;
  transition:.2s;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}
.theme-toggle:hover{
  transform:rotate(180deg) scale(1.1);
  box-shadow:0 0 20px var(--glow);
}
.player-wrapper{
  display:none;
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.95);
  z-index:9998;
}
.player-wrapper.active{display:block}
.close-player{
  position:absolute;
  top:15px;right:15px;
  background:linear-gradient(135deg,var(--royal),var(--royal2));
  border:2px solid var(--gold);
  color:var(--gold2);
  font-size:26px;
  width:48px;height:48px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
  transition:.2s;
  box-shadow:0 4px 15px var(--glow);
}
.close-player:hover{
  transform:rotate(90deg) scale(1.1);
  box-shadow:0 0 25px var(--glow);
}
.modal{
  display:none;
  position:fixed;
  z-index:10000;
  left:0;top:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(10px);
}
.modal-content{
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  margin:5% auto;
  padding:20px;
  border-radius:15px;
  width:94%;
  max-width:600px;
  max-height:80vh;
  overflow-y:auto;
  border:2px solid var(--gold);
  box-shadow:0 10px 40px var(--glow),0 0 30px var(--glow);
}
.modal-content h4{
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:20px;
  margin-bottom:15px;
  letter-spacing:1px;
  text-shadow:0 0 10px var(--glow);
}
.stats{
  position:fixed;
  bottom:15px;right:15px;
  background:linear-gradient(135deg,var(--royal),var(--royal2));
  padding:8px 16px;
  border-radius:20px;
  border:2px solid var(--gold);
  font-size:11px;
  backdrop-filter:blur(10px);
  z-index:99;
  color:var(--gold2);
  font-family:'Cinzel',serif;
  letter-spacing:1px;
  box-shadow:0 4px 15px var(--glow);
}
.pagination{
  display:flex;
  justify-content:center;
  gap:6px;
  padding:20px;
  flex-wrap:wrap;
}
.page-btn{
  padding:8px 14px;
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--accent);
  color:var(--text);
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
  font-family:'Cinzel',serif;
  transition:.2s;
}
.page-btn:hover{
  border-color:var(--gold);
  box-shadow:0 0 15px var(--glow);
  transform:translateY(-2px);
}
.page-btn.active{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg);
  border-color:var(--gold2);
  box-shadow:0 0 20px var(--glow);
}
.badge-ongoing{
  position:absolute;
  top:8px;left:8px;
  background:linear-gradient(135deg,#8b0000,#ff4757);
  color:#fff;
  padding:3px 8px;
  border-radius:5px;
  font-size:9px;
  font-weight:700;
  z-index:2;
  font-family:'Cinzel',serif;
  letter-spacing:1px;
  border:1px solid var(--gold);
  box-shadow:0 2px 8px rgba(255,71,87,.5);
}
.badge-episodes{
  position:absolute;
  bottom:8px;left:8px;
  background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(0,0,0,.7));
  color:var(--gold2);
  padding:3px 8px;
  border-radius:5px;
  font-size:9px;
  z-index:2;
  font-family:'Cinzel',serif;
  border:1px solid var(--accent);
}
.badge-trailer{
  position:absolute;
  bottom:8px;right:8px;
  background:linear-gradient(135deg,#8b0000,#ff0000);
  color:#fff;
  padding:3px 8px;
  border-radius:5px;
  font-size:9px;
  z-index:2;
  font-family:'Cinzel',serif;
  border:1px solid var(--gold);
  box-shadow:0 2px 8px rgba(255,0,0,.5);
}
.load-more{
  grid-column:1/-1;
  text-align:center;
  padding:20px;
}
.load-more button{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg);
  border:2px solid var(--gold2);
  padding:12px 30px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:14px;
  font-family:'Cinzel',serif;
  letter-spacing:2px;
  transition:.3s;
  box-shadow:0 4px 15px var(--glow);
}
.load-more button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px var(--glow),0 0 20px var(--glow);
}
.clear-cache{
  position:fixed;
  bottom:15px;left:15px;
  background:linear-gradient(135deg,rgba(139,0,0,.8),rgba(255,71,87,.8));
  border:2px solid var(--gold);
  color:var(--gold2);
  padding:8px 16px;
  border-radius:20px;
  font-size:11px;
  cursor:pointer;
  z-index:99;
  font-family:'Cinzel',serif;
  letter-spacing:1px;
  transition:.2s;
  box-shadow:0 4px 12px rgba(255,71,87,.4);
}
.clear-cache:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,71,87,.6);
}
.load-status{
  position:fixed;
  top:70px;left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,var(--royal),var(--royal2));
  color:var(--gold2);
  padding:8px 20px;
  border-radius:20px;
  font-size:12px;
  z-index:98;
  display:none;
  font-family:'Cinzel',serif;
  border:2px solid var(--gold);
  box-shadow:0 4px 20px var(--glow);
  letter-spacing:1px;
}
@media(max-width:768px){
 .anime-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
 .filters{grid-template-columns:repeat(2,1fr);gap:8px}
 .trailer-preview{display:none!important}
 .header h1{font-size:22px;letter-spacing:2px}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌓</button>
<button class="clear-cache" onclick="clearCache()">🗑️ Purge</button>
<div class="header"><h1>👑 HanAnim Fantasia Royale 👑</h1></div>
<div class="load-status" id="loadStatus">Loading API...</div>
<div class="loading" id="loading">
  <h3>⚡ Summoning 2500 Anime...</h3>
  <div class="progress-bar"><div class="progress" id="progress"></div></div>
  <p id="loadingText" style="font-size:13px;font-family:'Cinzel',serif;letter-spacing:1px;">100 Sacred API, Elegant Power...</p>
</div>
<div class="filters">
  <div class="filter-box"><label>Search</label><input type="text" id="searchInput" placeholder="🔍 Royal Title..." oninput="debounceFilter()" autocomplete="off"></div>
  <div class="filter-box"><label>Genre</label><select id="genreFilter" onchange="applyFilter()"><option value="">All Realms</option></select></div>
  <div class="filter-box"><label>Year</label><select id="yearFilter" onchange="applyFilter()"><option value="">All Eras</option></select></div>
  <div class="filter-box"><label>Status</label><select id="statusFilter" onchange="applyFilter()"><option value="">All</option><option value="airing">Ongoing</option><option value="completed">Complete</option></select></div>
  <div class="filter-box"><label>Sort</label><select id="sortFilter" onchange="applyFilter()">
    <option value="score">Royal Rating</option>
    <option value="episodes">Most Episodes</option>
    <option value="start_date">Newest Era</option>
    <option value="popularity">Most Popular</option>
    <option value="favorites">Favorited</option>
  </select></div>
</div>
<div class="anime-grid" id="animeGrid"></div>
<div class="load-more" id="loadMore" style="display:none"><button onclick="loadMoreCards()">Summon 20 More</button></div>
<div class="pagination" id="pagination"></div>
<div class="player-wrapper" id="playerWrapper"><button class="close-player" onclick="closePlayer()">×</button></div>
<div id="detailModal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><span style="float:right;font-size:24px;cursor:pointer;color:var(--gold)" onclick="closeModal()">&times;</span><div id="modalBody"></div></div></div>
<div class="stats">👑 <span id="totalCount">0</span> | 🔥 100 API</div>

<script>
let animeData=[],filtered=[],currentPage=1,perPage=16,displayedCount=16,favorites=JSON.parse(localStorage.getItem('favs')||'[]');
let debounceTimer,observer,hoverTimer=null,isLoadingMore=false,loadedPages=new Set();

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');
}
if(localStorage.getItem('theme')==='light')document.body.classList.add('light');

function toggleFav(id,e){
  e.stopPropagation();
  const i=favorites.indexOf(id);
  if(i>-1)favorites.splice(i,1);else favorites.push(id);
  localStorage.setItem('favs',JSON.stringify(favorites));
  event.target.textContent=favorites.includes(id)?'❤️':'🤍';
}

function showDetail(a,e){
  e.stopPropagation();
  document.getElementById('modalBody').innerHTML=`
    <h4>${a.title}</h4>
    <img src="${a.image}" loading="lazy" style="width:130px;border-radius:8px;float:left;margin:0 15px 15px 0;border:2px solid var(--gold);box-shadow:0 4px 15px var(--glow)">
    <p style="font-size:13px"><b>⭐ ${a.score}</b> | 📺 ${a.episodes} eps | 📅 ${a.year}</p>
    <p style="font-size:13px"><b>Status:</b> ${a.status==='airing'?'🔴 Ongoing':'✅ Completed'} | <b>Rank:</b> #${a.popularity||'-'}</p>
    <p style="font-size:13px"><b>Studio:</b> ${a.studios||'-'} | <b>Duration:</b> ${a.duration||'24min'}</p>
    <p style="font-size:13px"><b>Genres:</b> ${a.genres.join(', ')}</p>
    <p style="font-size:12px;clear:both;margin-top:12px;line-height:1.6"><b>Chronicle:</b><br>${(a.synopsis||'No chronicle recorded').slice(0,300)}...</p>
    <button onclick="playTrailer('${a.trailer}','${a.title.replace(/'/g,"\\'")}')" style="background:linear-gradient(135deg,#8b0000,#ff0000);color:#fff;border:2px solid var(--gold);padding:8px 14px;border-radius:6px;margin-top:12px;margin-right:6px;font-size:13px;font-family:'Cinzel',serif;cursor:pointer">▶️ Vision</button>
    <button onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(a.title)} Samehadaku episode 1','_blank')" style="background:linear-gradient(135deg,var(--royal),var(--royal2));color:var(--gold2);border:2px solid var(--gold);padding:8px 14px;border-radius:6px;margin-top:12px;margin-right:6px;font-size:13px;font-family:'Cinzel',serif;cursor:pointer">🎬 Chronicle 1</button>
    <button onclick="shareWA('${a.title.replace(/'/g,"\\'")}')" style="background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:2px solid var(--gold);padding:8px 14px;border-radius:6px;margin-top:12px;margin-right:6px;font-size:13px;font-family:'Cinzel',serif;cursor:pointer">Share</button>
    <button onclick="copyLink('${a.id}')" style="background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:2px solid var(--gold2);padding:8px 14px;border-radius:6px;margin-top:12px;font-size:13px;font-family:'Cinzel',serif;cursor:pointer">Copy Link</button>
  `;
  document.getElementById('detailModal').style.display='block';
}
function closeModal(){document.getElementById('detailModal').style.display='none'}
function shareWA(t){window.open(`https://wa.me/?text=Behold ${encodeURIComponent(t)} in HanAnim Fantasia: ${location.href}`,'_blank')}
function copyLink(id){navigator.clipboard.writeText(`${location.href}#anime-${id}`);alert('Sacred link copied!')}

function clearCache(){
  if(confirm('Purge the royal archives? This will re-summon 2500 anime')){
    localStorage.removeItem('animeCacheDewa');
    localStorage.removeItem('animeCacheTimeDewa');
    location.reload();
  }
}

async function loadDewaAPI(){
  const p=document.getElementById('progress'),l=document.getElementById('loadingText'),loading=document.getElementById('loading');

  const cached=localStorage.getItem('animeCacheDewa');
  const cacheTime=localStorage.getItem('animeCacheTimeDewa');
  if(cached && Date.now()-cacheTime<14400000){
    animeData=JSON.parse(cached);
    filtered=animeData;
    p.style.width='100%';
    l.textContent=`✅ ${animeData.length} anime from royal vault!`;
    setTimeout(()=>loading.style.display='none',100);
    setupFilters();renderCards();document.getElementById('totalCount').textContent=animeData.length;
    return;
  }

  let all=[],done=0,total=20;

  l.textContent=`Summoning initial 20/100 sacred scrolls...`;
  const batch1=Array.from({length:10},(_,i)=>fetchJikan(i+1));
  const batch2=Array.from({length:10},(_,i)=>fetchAnilist(i+1));
  const updateProgress=()=>{done++;p.style.width=(done/total*100)+'%';l.textContent=`Summoning ${done}/${total} scrolls...`};

  const results=await Promise.all([...batch1,...batch2].map(f=>f.then(r=>{updateProgress();return r}).catch(()=>[])));
  all=results.flat();

  const seen=new Set();
  animeData=all.filter(a=>{const t=a.title.toLowerCase();return seen.has(t)?false:seen.add(t)});
  filtered=animeData;

  l.textContent=`✅ ${animeData.length} Anime Manifested! Summoning rest...`;
  setTimeout(()=>loading.style.display='none',300);
  setupFilters();renderCards();document.getElementById('totalCount').textContent=animeData.length;

  loadBackgroundAPI();
}

async function loadBackgroundAPI(){
  if(isLoadingMore) return;
  isLoadingMore=true;
  const status=document.getElementById('loadStatus');
  status.style.display='block';
  status.textContent='⏳ Summoning 80 more sacred scrolls...';

  let all=[],done=20,total=100;
  const batch1=Array.from({length:40},(_,i)=>fetchJikan(i+11));
  const batch2=Array.from({length:40},(_,i)=>fetchAnilist(i+11));

  for(let i=0;i<batch1.length;i+=5){
    const chunk=[...batch1.slice(i,i+5),...batch2.slice(i,i+5)];
    const results=await Promise.all(chunk.map(f=>f.then(r=>r).catch(()=>[])));
    all.push(...results.flat());
    done+=10;
    status.textContent=`⏳ ${done}/100 scrolls... ${animeData.length+all.length} anime`;
    await new Promise(r=>setTimeout(r,150));
  }

  const seen=new Set([...animeData.map(a=>a.title.toLowerCase())]);
  const newData=all.filter(a=>{const t=a.title.toLowerCase();return seen.has(t)?false:seen.add(t)});
  animeData=[...animeData,...newData].slice(0,2500);
  filtered=animeData;

  localStorage.setItem('animeCacheDewa',JSON.stringify(animeData));
  localStorage.setItem('animeCacheTimeDewa',Date.now());

  document.getElementById('totalCount').textContent=animeData.length;
  setupFilters();applyFilter();
  status.textContent=`✅ Total ${animeData.length} anime in royal library!`;
  setTimeout(()=>status.style.display='none',2000);
  isLoadingMore=false;
}

async function fetchJikan(page){
  if(loadedPages.has('j'+page))return [];
  loadedPages.add('j'+page);
  try{
    const r=await fetch(`https://api.jikan.moe/v4/anime?page=${page}&limit=25&order_by=score&sort=desc`);
    const d=await r.json();
    return d.data.map(x=>({
      id:'j'+x.mal_id,title:x.title,image:x.images.jpg.small_image_url,
      score:x.score||0,episodes:x.episodes||0,year:x.year||2020,
      genres:x.genres.slice(0,3).map(g=>g.name),trailer:x.trailer?.youtube_id,
      synopsis:x.synopsis,studios:x.studios[0]?.name||'-',
      duration:x.duration,popularity:x.popularity||9999,
      status:x.status==='Currently Airing'?'airing':'completed'
    }));
  }catch(e){return []}
}

async function fetchAnilist(page){
  if(loadedPages.has('a'+page))return [];
  loadedPages.add('a'+page);
  try{
    const r=await fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:`query($p:Int){Page(page:$p,perPage:25){media(type:ANIME,sort:SCORE_DESC){id title{romaji}coverImage{medium}averageScore episodes seasonYear genres trailer{id site}description studios{nodes{name}}duration popularity status}}}`,"variables":{p:page}})
    });
    const d=await r.json();
    return d.data.Page.media.map(x=>({
      id:'a'+x.id,title:x.title.romaji,image:x.coverImage.medium,
      score:x.averageScore/10||0,episodes:x.episodes||0,year:x.seasonYear||2020,
      genres:x.genres.slice(0,3),trailer:x.trailer?.site==='youtube'?x.trailer.id:null,
      synopsis:x.description,studios:x.studios.nodes[0]?.name||'-',
      duration:x.duration+' min',popularity:x.popularity||9999,
      status:x.status==='RELEASING'?'airing':'completed'
    }));
  }catch(e){return []}
}

function previewTrailer(id,card){
  if(!id || window.innerWidth<768) return;
  clearTimeout(hoverTimer);
  hoverTimer=setTimeout(()=>{
    const preview=card.querySelector('.trailer-preview');
    const img=card.querySelector('.card-img');
    img.style.opacity='0';
    preview.style.display='block';
    preview.innerHTML=`<iframe width="100%" height="220" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}&vq=small" frameborder="0" allow="autoplay"></iframe>`;
  },1500);
}

function stopPreview(card){
  clearTimeout(hoverTimer);
  const preview=card.querySelector('.trailer-preview');
  const img=card.querySelector('.card-img');
  preview.style.display='none';
  preview.innerHTML='';
  img.style.opacity='1';
}

function createCard(a){
  const isFav=favorites.includes(a.id);
  return `<div class="card" id="anime-${a.id}" onmouseenter="previewTrailer('${a.trailer}',this)" onmouseleave="stopPreview(this)">
    ${a.status==='airing'?'<div class="badge-ongoing">ONGOING</div>':''}
    <div class="badge-episodes">Eps ${a.episodes}</div>
    ${a.trailer?'<div class="badge-trailer">🎬</div>':''}
    <button class="fav-btn" onclick="toggleFav('${a.id}',event)">${isFav?'❤️':'🤍'}</button>
    <div class="card-img-wrapper">
      <img data-src="${a.image}" class="card-img lazy" onclick="playTrailer('${a.trailer}','${a.title.replace(/'/g,"\\'")}')">
      <div class="trailer-preview"></div>
    </div>
    <div class="card-body" onclick="showDetail(${JSON.stringify(a).replace(/"/g,'&quot;')},event)">
      <div class="card-title">${a.title}</div>
      <div class="card-info">⭐ ${a.score} | 📅 ${a.year}</div>
      <div class="card-genres">${a.genres.slice(0,2).map(g=>`<span class="genre-tag">${g}</span>`).join('')}</div>
    </div></div>`;
}

function renderCards(){
  const grid=document.getElementById('animeGrid');
  const itemsToShow=filtered.slice(0,displayedCount);
  grid.innerHTML=itemsToShow.map(createCard).join('');

  document.getElementById('loadMore').style.display=displayedCount<filtered.length?'block':'none';

  if(observer)observer.disconnect();
  observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const img=e.target;
        if(img.dataset.src){img.src=img.dataset.src;delete img.dataset.src}
        observer.unobserve(img);
      }
    });
  },{rootMargin:'50px'});
  document.querySelectorAll('.lazy').forEach(img=>observer.observe(img));

  renderPagination();
}

function loadMoreCards(){
  displayedCount+=16;
  renderCards();
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(applyFilter,350);
}

function applyFilter(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const g=document.getElementById('genreFilter').value;
  const y=document.getElementById('yearFilter').value;
  const st=document.getElementById('statusFilter').value;
  const s=document.getElementById('sortFilter').value;

  filtered=animeData.filter(a=>
    (!q||a.title.toLowerCase().includes(q))&&
    (!g||a.genres.includes(g))&&
    (!y||a.year==y)&&
    (!st||a.status===st)&&
    (s!=='favorites'||favorites.includes(a.id))
  );

  if(s==='score')filtered.sort((a,b)=>b.score-a.score);
  if(s==='episodes')filtered.sort((a,b)=>b.episodes-a.episodes);
  if(s==='start_date')filtered.sort((a,b)=>b.year-a.year);
  if(s==='popularity')filtered.sort((a,b)=>a.popularity-b.popularity);

  currentPage=1;displayedCount=16;renderCards();
}

}

}
