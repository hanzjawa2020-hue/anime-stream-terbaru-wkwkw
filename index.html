<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hananim v14 Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0E0F14}.loading{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}.hidden{display:none}.server-btn.active{background:#2563EB}</style>
</head>
<body class="text-white font-sans min-h-screen pb-24">
  <div id="homePage">
    <header class="flex items-center gap-2 px-4 pt-4 sticky top-0 bg-[#0E0F14] z-10">
      <div class="w-6 h-6 rounded-full bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center"><span class="text-black text-xs font-bold">H</span></div>
      <p class="font-bold text-sm">Hananim v14 | Backend Proxy ✅</p>
    </header>
    <div class="mx-4 mt-4 bg-[#1A1B22] rounded-xl flex items-center px-3 py-2 gap-2">
      <input id="searchInput" placeholder="Cari Anime..." class="bg-transparent outline-none text-sm w-full text-gray-300">
    </div>
    <section class="mt-4 px-4"><h2 class="font-bold mb-3">Trending 🔥</h2><div id="animeList" class="grid grid-cols-2 gap-3 loading"></div></section>
  </div>
  <div id="detailPage" class="hidden">
    <header class="flex items-center gap-3 px-4 pt-4 sticky top-0 bg-[#0E0F14] z-10"><button onclick="backToHome()" class="text-2xl">←</button><h2 id="detailPageTitle" class="font-bold text-lg truncate">Detail</h2></header>
    <div id="detailContent" class="p-4 loading"></div>
  </div>
<script>
const KITSU_URL='https://kitsu.io/api/edge';
const VIDEO_URLS=['https://api-aniwatch.onrender.com','https://anistream-api.vercel.app','https://hianime-api.vercel.app'];
const PROXY_URL='/api/proxy.php?url=';
let activeVideoUrl='';
async function apiFetch(url,isVideo=false){const baseUrls=isVideo?VIDEO_URLS:[KITSU_URL];const urlsToTry=activeVideoUrl?[activeVideoUrl]:baseUrls;for(const base of urlsToTry){const fullUrl=PROXY_URL+encodeURIComponent(base+url);try{const c=new AbortController();const t=setTimeout(()=>c.abort(),8000);const res=await fetch(fullUrl,{signal:c.signal});clearTimeout(t);if(!res.ok)throw Error(res.status);if(isVideo&&base!==activeVideoUrl)activeVideoUrl=base;return await res.json()}catch(e){}}alert('Semua server mati');return{data:[],results:[],episodes:[],sources:[]}}
function showPage(t){document.getElementById('homePage').classList.add('hidden');document.getElementById('detailPage').classList.remove('hidden');document.getElementById('detailPageTitle').innerText=t}
function backToHome(){document.getElementById('detailPage').classList.add('hidden');document.getElementById('homePage').classList.remove('hidden');document.getElementById('detailContent').innerHTML='';loadTrending()}
function renderCards(l){const el=document.getElementById('animeList');el.classList.remove('loading');if(!l?.length)return el.innerHTML=`<p class="text-gray-500 text-sm col-span-2">Kosong / API Mati</p>`;el.innerHTML=l.map(a=>`<div class="cursor-pointer" onclick='openDetail("${a.id}")'><img src="${a.attributes.posterImage.large}" class="w-full h-[200px] rounded-xl object-cover"><p class="text-sm mt-1 truncate font-semibold">${a.attributes.titles.en_jp||a.attributes.titles.en}</p><p class="text-xs text-gray-400">Eps ${a.attributes.episodeCount||'?'}</p></div>`).join('')}
async function loadTrending(){document.getElementById('animeList').innerHTML=`<div class="w-full h-[240px] bg-[#1A1B22] rounded-xl loading"></div>`;const d=await apiFetch(`/trending/anime?limit=20`);renderCards(d.data)}
async function openDetail(id){showPage('Loading...');const r=await apiFetch(`/anime/${id}`);const a=r.data.attributes;document.getElementById('detailContent').innerHTML=`<img src="${a.posterImage.large}" class="w-full h-56 rounded-2xl object-cover"><h2 class="font-bold text-xl mt-3">${a.titles.en_jp}</h2><p class="text-xs text-gray-400 mt-1">Eps: ${a.episodeCount}</p><p class="text-sm text-gray-300 mt-3">${a.synopsis}</p><button onclick="loadEpisodes('${a.canonicalTitle}')" class="w-full bg-blue-600 py-2 rounded-lg text-sm mt-4 font-bold">▶️ Nonton</button><div id="playerBox" class="mt-4 hidden"></div>`}
async function loadEpisodes(title){document.getElementById('playerBox').classList.remove('hidden');document.getElementById('playerBox').innerHTML=`<p class="loading text-sm">Nyari server tercepat...</p>`;const s=await apiFetch(`/anime/zoro/${encodeURIComponent(title)}?page=1`,true);const animeId=s.results?.[0]?.id;if(!animeId)return document.getElementById('playerBox').innerHTML=`<p class="text-red-500 text-sm">Ga ketemu</p>`;const i=await apiFetch(`/anime/zoro/info?id=${animeId}`,true);let sb=`<div class="flex gap-2 mb-2">Server: `;['vidhide','megacloud','streamtape'].forEach(sv=>{sb+=`<button onclick="playEpisode('${i.episodes[0].id}','${sv}')" class="server-btn bg-[#1A1B22] px-2 py-1 rounded text-xs">${sv}</button>`});sb+=`</div>`;let eh=`<h3 class="font-bold mt-2 mb-2">Episode</h3><div class="grid grid-cols-5 gap-2 mb-3 max-h-40 overflow-y-auto">`;i.episodes.forEach(ep=>{eh+=`<button onclick="playEpisode('${ep.id}')" class="bg-[#1A1B22] active:bg-blue-600 py-2 rounded-lg text-xs">Eps ${ep.number}</button>`});eh+=`</div>${sb}<div id="videoPlayer"></div>`;document.getElementById('playerBox').innerHTML=eh;playEpisode(i.episodes[0].id)}
async function playEpisode(episodeId,server='vidhide'){document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.server-btn[onclick*="${server}"]`)?.classList.add('active');document.getElementById('videoPlayer').innerHTML=`<p class="loading text-sm">Loading ${server}...</p>`;const d=await apiFetch(`/anime/zoro/watch?episodeId=${episodeId}&server=${server}`,true);const m3u8=d.sources?.[0]?.url;if(!m3u8)return document.getElementById('videoPlayer').innerHTML=`<p class="text-red-500 text-sm">Server ${server} kosong</p>`;document.getElementById('videoPlayer').innerHTML=`<iframe src="https://player.videasy.net/?url=${encodeURIComponent(m3u8)}" class="w-full aspect-video rounded-xl" frameborder="0" allowfullscreen></iframe>`}
document.getElementById('searchInput').addEventListener('keydown',async e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q.length<2)return;document.getElementById('animeList').innerHTML=`<div class="w-full h-[240px] bg-[#1A1B22] rounded-xl loading"></div>`;const d=await apiFetch(`/anime?filter[text]=${q}&limit=20`);renderCards(d.data)}});
loadTrending();
</script></body></html>
