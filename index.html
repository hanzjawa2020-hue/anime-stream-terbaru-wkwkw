<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>baca manga by Han</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;--card:#f8f9fa;--text:#1a1a1a;--muted:#6c757d;--primary:#007AFF;--border:#e9ecef;--shadow:0 2px 12px rgba(0,0,0,.08)
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
    body{background:var(--bg);color:var(--text);line-height:1.6}
    header{background:rgba(255,255,255,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:700;font-size:20px;color:var(--primary)}
.status{font-size:12px;color:var(--muted);padding:4px 10px;background:var(--card);border-radius:20px}
.container{max-width:1200px;margin:auto;padding:24px 20px}
    #search{width:100%;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:16px;margin-bottom:20px;transition:.2s}
    #search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,122,255,.1)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:.3s;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card img{width:100%;height:240px;object-fit:cover;background:var(--card)}
.card-body{padding:12px}
.card h3{font-size:14px;font-weight:600;height:40px;overflow:hidden;margin-bottom:4px}
.card p{font-size:12px;color:var(--muted)}
    #loader{text-align:center;padding:60px 20px;font-size:16px;color:var(--muted)}
.modal{display:none;position:fixed;z-index:200;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);overflow-y:auto}
.modal-content{background:var(--bg);margin:40px auto;max-width:1000px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
.modal-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:22px;font-weight:700}
.close{font-size:28px;cursor:pointer;color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
.close:hover{background:var(--card)}
.detail-info{display:flex;gap:24px;padding:24px;flex-wrap:wrap}
.detail-info img{width:220px;border-radius:12px;box-shadow:var(--shadow)}
.detail-meta h3{font-size:18px;margin-bottom:8px}
.detail-meta p{color:var(--muted);font-size:14px}
.chapter-list{padding:0 24px 24px;max-height:450px;overflow-y:auto}
.chapter-item{padding:14px 16px;background:var(--card);margin-bottom:10px;border-radius:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;border:1px solid transparent}
.chapter-item:hover{border-color:var(--primary);transform:translateX(4px)}
.chapter-item span{font-size:11px;background:var(--primary);color:#fff;padding:3px 8px;border-radius:6px;font-weight:600}
    #reader{background:#000;padding:0;text-align:center;min-height:100vh}
    #reader img{max-width:100%;margin-bottom:4px;background:#111;min-height:500px;display:block;margin-left:auto;margin-right:auto}
.reader-controls{display:flex;justify-content:center;gap:12px;padding:16px;flex-wrap:wrap;position:sticky;top:0;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);z-index:50;border-bottom:1px solid var(--border)}
.btn{background:var(--primary);border:none;padding:10px 18px;border-radius:10px;color:#fff;cursor:pointer;font-weight:600;transition:.2s}
.btn:hover{opacity:.8}
.btn-outline{background:var(--card);color:var(--text);border:1px solid var(--border)}
.error{color:#FF3B30;text-align:center;padding:40px 20px;line-height:1.6}
.page-status{font-size:12px;color:#888;padding:8px;text-align:center}
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">baca manga by Han</div>
      <div id="status" class="status">SIAP BACA</div>
    </div>
  </header>
  <div class="container">
    <input type="text" id="search" placeholder="Cari manga... Tekan Enter">
    <div id="loader">Memuat manga...</div>
    <div class="grid" id="mangaGrid"></div>
  </div>

  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="detailTitle"></h2><span class="close" onclick="closeModal()">&times;</span></div>
      <div id="detailBody"></div>
    </div>
  </div>

  <div id="readerModal" class="modal">
    <div class="modal-content" style="max-width:100%;margin:0;border-radius:0">
      <div class="reader-controls">
        <button class="btn btn-outline" onclick="prevChapter()">← Prev</button>
        <button class="btn btn-outline" onclick="backToChapter()">Daftar Chapter</button>
        <button class="btn" onclick="nextChapter()">Next →</button>
        <button class="btn btn-outline" onclick="closeReader()">Tutup</button>
      </div>
      <div class="modal-header" style="position:sticky;top:61px;background:var(--bg);z-index:49"><h2 id="readerTitle"></h2></div>
      <div id="reader"></div>
    </div>
  </div>

<script>
const mangaGrid = document.getElementById('mangaGrid');
const loader = document.getElementById('loader');
const statusDiv = document.getElementById('status');
let currentChapterList = [], currentChapterIndex = 0, currentManga = null;

// PROXY API YANG MASIH AKTIF OKTOBER 2026
const PROXY_LIST = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://cloudflare-cors-anywhere.weserv.workers.dev/?',
  'https://cors-proxy.fringe.zone/'
];

// 8 PROXY GAMBAR TERCEPAT + FIX HOTLINK
const IMG_PROXY_LIST = [
  '', // DIRECT - dipake kalo WARP nyala
  'https://images.weserv.nl/?url=', // Buat cover MangaDex
  'https://i0.wp.com/',
  'https://i1.wp.com/',
  'https://i2.wp.com/',
  'https://t0.gstatic.com/images?q=tbn:',
  'https://r.jina.ai/http://',
  'https://wsrv.nl/?url='
];

function updateStatus(msg) { statusDiv.innerText = msg; }

async function nFetch(url) {
  for (let i = 0; i < PROXY_LIST.length; i++) {
    try {
      updateStatus(`API: ${PROXY_LIST[i].split('/')[2]}`);
      const res = await fetch(PROXY_LIST[i] + encodeURIComponent(url), {signal: AbortSignal.timeout(10000)});
      if (res.ok) return res;
    } catch(e) {}
  }
  throw new Error('Gagal ambil data. Nyalain 1.1.1.1 WARP');
}

async function loadImage(imgEl, url, isCover = false) {
  imgEl.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
  const startIndex = isCover? 1 : 0; // Cover wajib proxy, Chapter coba Direct dulu
  for (let i = startIndex; i < IMG_PROXY_LIST.length; i++) {
    const proxy = IMG_PROXY_LIST[i];
    let finalUrl = url;
    if (proxy.includes('jina.ai')) finalUrl = url.replace('https://', '');
    const fullUrl = proxy? proxy + encodeURIComponent(finalUrl) : url;
    try {
      updateStatus(isCover? `Cover: ${proxy.split('/')[2]||'Direct'}` : `Img: ${proxy.split('/')[2]||'Direct'}`);
      const res = await fetch(fullUrl, {signal: AbortSignal.timeout(7000)});
      if (res.ok) {
        const blob = await res.blob();
        imgEl.src = URL.createObjectURL(blob);
        return;
      }
    } catch(e) {}
  }
}

async function loadPageImage(imgEl, url, pageNum) {
  const statusEl = document.createElement('div');
  statusEl.className = 'page-status';
  statusEl.innerText = `Memuat halaman ${pageNum}...`;
  imgEl.after(statusEl);
  for (let i = 0; i < IMG_PROXY_LIST.length; i++) {
    const proxy = IMG_PROXY_LIST[i];
    let finalUrl = url;
    if (proxy.includes('jina.ai')) finalUrl = url.replace('https://', '');
    const fullUrl = proxy? proxy + encodeURIComponent(finalUrl) : url;
    try {
      statusEl.innerText = `Halaman ${pageNum}: ${proxy.split('/')[2] || 'Direct'}`;
      const res = await fetch(fullUrl, {signal: AbortSignal.timeout(25000)});
      if (res.ok) {
        const blob = await res.blob();
        imgEl.src = URL.createObjectURL(blob);
        statusEl.remove();
        localStorage.setItem(`read_${currentManga.id}_${currentChapterList[currentChapterIndex].id}`, pageNum);
        return;
      }
    } catch(e) {}
  }
  statusEl.innerText = `Halaman ${pageNum}: Gagal`;
}

async function loadManga(title = '') {
  try {
    loader.style.display = 'block';
    loader.innerText = 'Mengambil data manga...';
    mangaGrid.innerHTML = '';
    let url = `https://api.mangadex.org/manga?limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en&order[followedCount]=desc&contentRating[]=safe&contentRating[]=suggestive`;
    if (title) url = `https://api.mangadex.org/manga?title=${encodeURIComponent(title)}&limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en`;
    const res = await nFetch(url);
    const data = await res.json();
    if (!data.data?.length) throw new Error('Manga tidak ditemukan');
    const results = data.data.map(m => {
      const cover = m.relationships.find(r => r.type === 'cover_art');
      const title = m.attributes.title.en || m.attributes.title['ja-ro'] || Object.values(m.attributes.title)[0] || 'No Title';
      const desc = m.attributes.description.en || m.attributes.description.id || '';
      const coverUrl = cover?.attributes?.fileName? `https://uploads.mangadex.org/covers/${m.id}/${cover.attributes.fileName}.512.jpg` : '';
      return { id: m.id, title, cover: coverUrl, desc, year: m.attributes.year || '' };
    });
    renderManga(results);
    loader.style.display = 'none';
    updateStatus(`ONLINE | ${results.length} manga`);
  } catch (e) {
    loader.innerHTML = `<div class="error"><b>Gagal</b><br>${e.message}</div>`;
  }
}

function renderManga(list) {
  mangaGrid.innerHTML = '';
  list.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    const img = new Image();
    img.loading = 'lazy';
    loadImage(img, m.cover, true);
    card.innerHTML = `<div class="card-body"><h3>${m.title}</h3><p>${m.year || 'Manga'}</p></div>`;
    card.prepend(img);
    card.onclick = () => openDetail(m);
    mangaGrid.appendChild(card);
  });
}

async function openDetail(manga) {
  currentManga = manga;
  document.getElementById('detailTitle').innerText = manga.title;
  document.getElementById('detailModal').style.display = 'block';
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-info">
      <img id="detailCover">
      <div class="detail-meta">
        <h3>Sinopsis</h3>
        <p>${manga.desc? manga.desc.substring(0,400).replace(/<[^>]*>/g,'')+'...' : 'Tidak ada deskripsi'}</p>
        <p style="margin-top:12px"><b>Tahun:</b> ${manga.year || '-'}</p>
      </div>
    </div>
    <div class="chapter-list" id="chapterList"><p>Memuat daftar chapter...</p></div>`;
  loadImage(document.getElementById('detailCover'), manga.cover, true);
  await loadChapters(manga.id);
}

async function loadChapters(mangaId) {
  try {
    const url = `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=id&translatedLanguage[]=en&order[chapter]=desc&limit=500`;
    const res = await nFetch(url);
    const data = await res.json();
    if (!data.data?.length) throw new Error('Chapter tidak tersedia');
    currentChapterList = data.data.map(ch => ({
      id: ch.id, chapter: ch.attributes.chapter || 'Oneshot',
      title: ch.attributes.title || '', lang: ch.attributes.translatedLanguage
    })).sort((a,b) => parseFloat(b.chapter) - parseFloat(a.chapter));
    let chapHtml = '<h3 style="padding:0 0 16px 0">Daftar Chapter</h3>';
    currentChapterList.forEach((ch, idx) => {
      const readPos = localStorage.getItem(`read_${mangaId}_${ch.id}`);
      chapHtml += `<div class="chapter-item" onclick="openReader(${idx})">
        <div>Chapter ${ch.chapter} ${ch.title? '- ' + ch.title : ''} ${readPos? '✓ Hal.'+readPos : ''}</div>
        <span>${ch.lang.toUpperCase()}</span></div>`;
    });
    document.getElementById('chapterList').innerHTML = chapHtml;
  } catch(e) {
    document.getElementById('chapterList').innerHTML = '<p>Gagal memuat chapter.</p>';
  }
}

async function openReader(index) {
  currentChapterIndex = index;
  const ch = currentChapterList[index];
  document.getElementById('detailModal').style.display = 'none';
  document.getElementById('readerModal').style.display = 'block';
  document.getElementById('readerTitle').innerText = `${currentManga.title} - Ch. ${ch.chapter}`;
  document.getElementById('reader').innerHTML = '<p style="padding:60px">Menghubungi server...</p>';
  try {
    const res = await nFetch(`https://api.mangadex.org/at-home/server/${ch.id}?forcePort443=true`);
    const data = await res.json();
    const pages = data.chapter.dataSaver;
    document.getElementById('reader').innerHTML = '';
    const lastRead = parseInt(localStorage.getItem(`read_${currentManga.id}_${ch.id}`) || '1');
    for (let i = 0; i < pages.length; i++) {
      const img = new Image();
      img.loading = 'lazy';
      img.style = 'max-width:100%;margin-bottom:4px;background:#111;min-height:600px;display:block;margin-left:auto;margin-right:auto';
      img.dataset.src = `${data.baseUrl}/data-saver/${data.chapter.hash}/${pages[i]}`;
      document.getElementById('reader').appendChild(img);
    }
    const imgs = document.querySelectorAll('#reader img');
    const startLoad = Math.max(0, lastRead - 2);
    for(let i = startLoad; i < Math.min(startLoad + 3, imgs.length); i++){
      loadPageImage(imgs[i], imgs[i].dataset.src, i + 1);
    }
    if(lastRead > 3) setTimeout(() => imgs[lastRead-1].scrollIntoView(), 500);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting &&!entry.target.src.startsWith('blob:')) {
          const pageNum = Array.from(imgs).indexOf(entry.target) + 1;
          loadPageImage(entry.target, entry.target.dataset.src, pageNum);
          observer.unobserve(entry.target);
        }
      });
    }, {rootMargin: '1200px'});
    imgs.forEach(img => observer.observe(img));
  } catch(e) {
    document.getElementById('reader').innerHTML = `<p style="padding:60px">Gagal: ${e.message}</p>`;
  }
}

function prevChapter() { if(currentChapterIndex < currentChapterList.length - 1) openReader(currentChapterIndex + 1); }
function nextChapter() { if(currentChapterIndex > 0) openReader(currentChapterIndex - 1); }
function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
function closeReader() { document.getElementById('readerModal').style.display = 'none'; document.getElementById('reader').innerHTML = ''; }
function backToChapter() { document.getElementById('readerModal').style.display = 'none'; document.getElementById('detailModal').style.display = 'block'; }
document.getElementById('search').addEventListener('keypress', e => { if (e.key === 'Enter') loadManga(e.target.value); });
loadManga();
</script>
</body>
</html>
