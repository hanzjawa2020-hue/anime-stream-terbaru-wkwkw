<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HanAnim</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',sans-serif;
    background:url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070') center/cover fixed;
    color:#fff;min-height:100vh
  }
  body::before{content:'';position:fixed;inset:0;background:rgba(10,10,25,0.88);backdrop-filter:blur(10px);z-index:-1}
  .container{max-width:1400px;margin:0 auto;padding:40px 20px}
  header{text-align:center;margin-bottom:50px}
  h1{font-size:52px;font-weight:700;background:linear-gradient(135deg,#d4af37,#ffd700,#f7e7ce);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;filter:drop-shadow(0 0 20px rgba(212,175,55,0.4))}
  .subtitle{color:#c9a961;margin-top:12px;font-size:14px;letter-spacing:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
  .card{background:linear-gradient(135deg,rgba(30,30,50,0.7),rgba(20,20,35,0.7));border:1px solid rgba(212,175,55,0.15);border-radius:14px;overflow:hidden;transition:.4s;backdrop-filter:blur(12px)}
  .card:hover{transform:translateY(-10px) scale(1.02);border-color:#d4af37;box-shadow:0 25px 50px rgba(212,175,55,0.25)}
  .card img{width:100%;height:280px;object-fit:cover}
  .card h3{padding:14px;font-size:14px;font-weight:500;color:#f0f0f0;line-height:1.4}
  .loading{text-align:center;padding:80px;font-size:18px;color:#d4af37}
  .error{text-align:center;padding:60px;color:#ff6b6b}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>HanAnim</h1>
    <p class="subtitle">LUXURY ANIME UNIVERSE</p>
  </header>
  <div id="content"><div class="loading">Memuat 20 sumber...</div></div>
</div>

<script>
const APIS = [
  'https://api.jikan.moe/v4/top/anime?limit=25',
  'https://api.jikan.moe/v4/season/now?limit=25',
  'https://api.jikan.moe/v4/anime?order_by=popularity&limit=25',
  'https://api.jikan.moe/v4/anime?order_by=score&limit=25',
  'https://api.jikan.moe/v4/anime?status=airing&limit=25',
  'https://api.jikan.moe/v4/anime?status=complete&limit=25',
  'https://api.jikan.moe/v4/anime?order_by=favorites&limit=25',
  'https://api.jikan.moe/v4/anime?genres=1&limit=25',
  'https://api.jikan.moe/v4/anime?genres=2&limit=25',
  'https://api.jikan.moe/v4/anime?genres=4&limit=25',
  'https://api.jikan.moe/v4/anime?genres=8&limit=25',
  'https://api.jikan.moe/v4/anime?genres=10&limit=25',
  'https://api.jikan.moe/v4/anime?genres=14&limit=25',
  'https://api.jikan.moe/v4/anime?genres=22&limit=25',
  'https://api.jikan.moe/v4/anime?genres=24&limit=25',
  'https://api.jikan.moe/v4/anime?genres=36&limit=25',
  'https://api.jikan.moe/v4/anime?genres=37&limit=25',
  'https://api.jikan.moe/v4/anime?start_date=2024&limit=25',
  'https://api.jikan.moe/v4/anime?start_date=2023&limit=25',
  'https://api.jikan.moe/v4/anime?start_date=2025&limit=25'
];

async function tryFetch(urls){
  for(const url of urls){
    try{
      const res = await fetch(url);
      if(res.ok){
        const data = await res.json();
        if(data.data && data.data.length > 0) return data.data;
      }
    }catch(e){continue}
  }
  return [];
}

async function load(){
  const data = await tryFetch(APIS);
  if(data.length === 0){
    document.getElementById('content').innerHTML='<div class="error">20 API gagal. Coba refresh</div>';
    return;
  }
  const unique = [...new Map(data.map(i=>[i.mal_id,i])).values()].slice(0,30);
  const html = `<div class="grid">${unique.map(a=>`
    <div class="card">
      <img src="${a.images?.jpg?.large_image_url||a.images?.jpg?.image_url}" loading="lazy">
      <h3>${a.title||a.title_english}</h3>
    </div>`).join('')}</div>`;
  document.getElementById('content').innerHTML = html;
}
load();
</script>
</body>
</html>
