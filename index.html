<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanime - Nonton Anime Legal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkhhbmFtZSIsCiAgInNob3J0X25hbWUiOiAiSGFuaW1lIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGEwYTBhIiwKICAidGhlbWVfY29sb3IiOiAiI2VmNDQ0NCIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzM5NDMvMzk0Mzc0My5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">
  <meta name="theme-color" content="#ef4444">
  <style>
    .anime-card:hover img { transform: scale(1.05); }
    .anime-card:hover .play-btn { opacity: 1; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  
  <!-- Header -->
  <div class="sticky top-0 z-50 bg-zinc-950/90 backdrop-blur border-b border-zinc-800 p-4">
    <div class="max-w-7xl mx-auto flex items-center gap-3">
      <div class="bg-red-600 w-10 h-10 rounded-lg flex items-center justify-center text-xl">⛩️</div>
      <h1 class="text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">Hanime</h1>
      <span class="text-xs bg-green-600 px-2 py-1 rounded-full ml-2">100% Legal</span>
    </div>
  </div>

  <!-- Banner -->
  <div class="bg-gradient-to-r from-red-900/50 to-zinc-900 p-6 text-center border-b border-zinc-800">
    <p class="text-zinc-300">Nonton anime resmi dari <b>Muse Indonesia</b> & <b>Ani-One Asia</b></p>
  </div>

  <!-- List Anime -->
  <div class="max-w-7xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="anime-list"></div>

  <!-- Player -->
  <div id="player-wrap" class="hidden fixed inset-0 bg-black z-50">
    <div id="player" class="w-full h-full"></div>
    <button onclick="closePlayer()" class="absolute top-4 right-4 bg-zinc-800 rounded-full w-10 h-10 text-xl">×</button>
  </div>

  <script>
    // DAFTAR ANIME LEGAL - Dari channel YouTube resmi
    const animeList = [
      { id: 'J8-P-u3cKpc', title: 'Spy x Family S2', eps: 'EP 1', channel: 'Muse Indonesia' },
      { id: 'c-jHrGzK9yQ', title: 'Oshi no Ko S2', eps: 'EP 1', channel: 'Muse Indonesia' },
      { id: 'd9TpRfDdyU0', title: 'Solo Leveling', eps: 'EP 1', channel: 'Muse Indonesia' },
      { id: 'gv5j4siR_gA', title: 'Frieren', eps: 'EP 1', channel: 'Muse Indonesia' },
      { id: 'cYdMEBZByt0', title: 'Jujutsu Kaisen S2', eps: 'EP 1', channel: 'Muse Indonesia' },
      { id: '2x_Jqi9oZP8', title: 'One Piece', eps: 'EP 1089', channel: 'Muse Indonesia' },
      { id: 'gf_UgJR4_TA', title: 'Dr. Stone New World', eps: 'EP 1', channel: 'Ani-One Asia' },
      { id: 'bP2sl6oFz70', title: 'The Eminence in Shadow', eps: 'EP 1', channel: 'Ani-One Asia' }
    ];

    // Render
    const list = document.getElementById('anime-list');
    animeList.forEach(v => {
      list.innerHTML += `
        <div class="anime-card cursor-pointer group" onclick="playAnime('${v.id}')">
          <div class="relative rounded-xl overflow-hidden mb-2">
            <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" class="w-full aspect-[3/4] object-cover transition duration-300">
            <div class="play-btn opacity-0 transition absolute inset-0 bg-black/60 flex items-center justify-center">
              <div class="bg-red-600 rounded-full p-3 text-xl">▶</div>
            </div>
            <div class="absolute top-2 left-2 bg-red-600 text-xs px-2 py-1 rounded">${v.eps}</div>
          </div>
          <h3 class="font-semibold text-sm line-clamp-2">${v.title}</h3>
          <p class="text-xs text-zinc-400">${v.channel}</p>
        </div>
      `;
    });

    // YouTube Player
    let player;
    function playAnime(videoId) {
      document.getElementById('player-wrap').classList.remove('hidden');
      if (!player) {
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);
        window.onYouTubeIframeAPIReady = () => {
          player = new YT.Player('player', { 
            videoId: videoId, 
            playerVars: { autoplay: 1, playsinline: 1, rel: 0, modestbranding: 1 } 
          });
        };
      } else {
        player.loadVideoById(videoId);
      }
    }
    function closePlayer() {
      document.getElementById('player-wrap').classList.add('hidden');
      if(player) player.stopVideo();
    }
  </script>
</body>
</html>
