<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>baca manga aja - FINAL BOSS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#0a0a0a;color:#fff}
    header{background:#1f1f1f;padding:15px;position:sticky;top:0;z-index:100;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px}
.card{background:#1f1f1f;border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:220px;object-fit:cover;background:#333}
.card h3{font-size:13px;padding:8px;height:48px;overflow:hidden}
    #loader{text-align:center;padding:40px;font-size:18px}
.modal{display:none;position:fixed;z-index:200;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.95);overflow-y:auto}
.modal-content{background:#121212;margin:20px auto;max-width:900px;border-radius:10px}
.modal-header{padding:20px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#121212;z-index:10}
.close{font-size:30px;cursor:pointer}
.detail-info{display:flex;gap:20px;padding:20px;flex-wrap:wrap}
.detail-info img{width:200px;border-radius:8px;background:#333}
.chapter-list{padding:0 20px 20px;max-height:400px;overflow-y:auto}
.chapter-item{padding:12px;background:#1f1f1f;margin-bottom:8px;border-radius:5px;cursor:pointer;display:flex;justify-content:space-between}
.chapter-item:hover{background:#333}
.chapter-item span{font-size:11px;background:#ff4500;padding:2px 6px;border-radius:3px}
    #reader{background:#000;padding:10px 0;text-align:center;min-height:100vh}
    #reader img{max-width:100%;margin-bottom:3px;background:#111;min-height:200px;display:block;margin-left:auto;margin-right:auto}
.btn{background:#ff4500;border:none;padding:10px 15px;border-radius:5px;color:#fff;cursor:pointer;margin:5px}
.reader-controls{display:flex;justify-content:center;gap:10px;padding:15px;flex-wrap:wrap;position:sticky;top:0;background:#121212;z-index:50}
    #search{width:100%;padding:12px;margin-bottom:20px;background:#333;border:none;border-radius:5px;color:#fff;font-size:16px}
.error{color:#ff5555;text-align:center;padding:20px;line-height:1.6}
.status{color:#00c853;text-align:center;padding:10px;font-size:11px}
  </style>
</head>
<body>
  <header><h2>baca manga aja - FINAL BOSS</h2></header>
  <div class="container">
    <input type="text" id="search" placeholder="Cari manga... Enter untuk cari">
    <div id="status" class="status">FINAL BOSS AKTIF</div>
    <div id="loader">Loading...</div>
    <div class="grid" id="mangaGrid"></div>
  </div>
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="detailTitle"></h2><span class="close" onclick="closeModal()">&times;</span></div>
      <div id="detailBody"></div>
    </div>
  <div id="readerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="readerTitle"></h2><span class="close" onclick="closeReader()">&times;</span></div>
      <div class="reader-controls">
        <button class="btn" onclick="prevChapter()">← Prev</button>
        <button class="btn" onclick="backToChapter()">Daftar Chapter</button>
        <button class="btn" onclick="nextChapter()">Next →</button>
      </div>
      <div id="reader"></div>
    </div>
  </div>
<script>
const mangaGrid = document.getElementById('mangaGrid');
const loader = document.getElementById('loader');
const statusDiv = document.getElementById('status');
let currentChapterList = [], currentChapterIndex = 0;

// CUMA 1 PROXY BUAT SEMUANYA: API + GAMBAR
const PROXY = 'https://corsproxy.io/?';
let failCount = 0;

function updateStatus(msg) { statusDiv.innerText = msg; }

async function pFetch(url, isImage = false) {
  try {
    const res = await fetch(PROXY + encodeURIComponent(url), {
      signal: AbortSignal.timeout(isImage? 8000 : 3000),
      headers: isImage? {} : {'Accept': 'application/json'}
    });
    if (res.ok) {
      failCount = 0;
      return res;
    }
    throw new Error('Proxy fail');
  } catch(e) {
    failCount++;
    if (failCount > 3) throw new Error('corsproxy.io diblokir. Wajib 1.1.1.1');
    throw e;
  }
}

// LOAD GAMBAR PAKE BLOB - 100% LEWAT PROXY
async function loadImage(imgEl, url) {
  try {
    imgEl.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; // placeholder
    const res = await pFetch(url, true);
    const blob = await res.blob();
    imgEl.src = URL.createObjectURL(blob);
  } catch(e) {
    imgEl.src = 'https://via.placeholder.com/160x220/333/fff?text=Error';
  }
}

async function loadManga(title = '') {
  try {
    loader.style.display = 'block';
    loader.innerText = 'Final boss loading...';
    mangaGrid.innerHTML = '';
    let url = `https://api.mangadex.org/manga?limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en&order[followedCount]=desc&contentRating[]=safe&contentRating[]=suggestive`;
    if (title) url = `https://api.mangadex.org/manga?title=${encodeURIComponent(title)}&limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en`;

    const res = await pFetch(url);
    const data = await res.json();
    if (!data.data?.length) throw new Error('Manga tidak ditemukan');

    const results = data.data.map(m => {
      const cover = m.relationships.find(r => r.type === 'cover_art');
      const title = m.attributes.title.en || m.attributes.title['ja-ro'] || Object.values(m.attributes.title)[0] || 'No Title';
      const desc = m.attributes.description.en || m.attributes.description.id || '';
      const coverUrl = cover?.attributes?.fileName? `https://uploads.mangadex.org/covers/${m.id}/${cover.attributes.fileName}.256.jpg` : '';
      return { id: m.id, title, cover: coverUrl, desc };
    });

    renderManga(results);
    loader.style.display = 'none';
    updateStatus(`FINAL BOSS TEMBUS | ${results.length} manga`);
  } catch (e) {
    loader.innerHTML = `<div class="error"><b>CHECKMATE</b><br>${e.message}<br><br>Kominfo menang. Install 1.1.1.1 WARP sekarang.</div>`;
  }
}

function renderManga(list) {
  mangaGrid.innerHTML = '';
  list.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    const img = new Image();
    img.loading = 'lazy';
    loadImage(img, m.cover); // PAKE BLOB, BUKAN URL LANGSUNG
    card.innerHTML = `<h3>${m.title}</h3>`;
    card.prepend(img);
    card.onclick = () => openDetail(m);
    mangaGrid.appendChild(card);
  });
}

async function openDetail(manga) {
  document.getElementById('detailTitle').innerText = manga.title;
  document.getElementById('detailModal').style.display = 'block';
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-info">
      <img id="detailCover">
      <div><p><b>Source:</b> MangaDex</p><p style="margin-top:10px">${manga.desc? manga.desc.substring(0,300).replace(/<[^>]*>/g,'')+'...' : 'No description'}</p></div>
    <div class="chapter-list" id="chapterList"><p>Loading chapter...</p></div>`;
  loadImage(document.getElementById('detailCover'), manga.cover);
  await loadChapters(manga.id);
}

async function loadChapters(mangaId) {
  try {
    const url = `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=id&translatedLanguage[]=en&order[chapter]=desc&limit=500`;
    const res = await pFetch(url);
    const data = await res.json();
    if (!data.data?.length) throw new Error('No chapter');
    currentChapterList = data.data.map(ch => ({
      id: ch.id, chapter: ch.attributes.chapter || 'Oneshot',
      title: ch.attributes.title || '', lang: ch.attributes.translatedLanguage
    }));
    let chapHtml = '<h3>Pilih Chapter</h3>';
    currentChapterList.forEach((ch, idx) => {
      chapHtml += `<div class="chapter-item" onclick="openReader(${idx})"><div>Ch. ${ch.chapter} ${ch.title}</div><span>${ch.lang.toUpperCase()}</span></div>`;
    });
    document.getElementById('chapterList').innerHTML = chapHtml;
  } catch(e) {
    document.getElementById('chapterList').innerHTML = '<p>Gagal load chapter.</p>';
  }
}

async function openReader(index) {
  currentChapterIndex = index;
  const ch = currentChapterList[index];
  document.getElementById('detailModal').style.display = 'none';
  document.getElementById('readerModal').style.display = 'block';
  document.getElementById('readerTitle').innerText = `Ch. ${ch.chapter} - ${ch.title}`;
  document.getElementById('reader').innerHTML = '<p style="padding:40px">Loading halaman...</p>';
  try {
    const res = await pFetch(`https://api.mangadex.org/at-home/server/${ch.id}`);
    const data = await res.json();
    document.getElementById('reader').innerHTML = '';
    for (const page of data.chapter.dataSaver) {
      const imgUrl = `${data.baseUrl}/data-saver/${data.chapter.hash}/${page}`;
      const img = new Image();
      img.loading = 'lazy';
      img.style = 'max-width:100%;margin-bottom:3px;background:#111;min-height:200px;display:block;margin-left:auto;margin-right:auto';
      document.getElementById('reader').appendChild(img);
      loadImage(img, imgUrl); // DOWNLOAD 1-1 LEWAT PROXY
    }
    window.scrollTo(0, 0);
  } catch(e) {
    document.getElementById('reader').innerHTML = '<p style="padding:40px">Gagal. Nyalain 1.1.1.1</p>';
  }
}

function prevChapter() { if(currentChapterIndex > 0) openReader(currentChapterIndex - 1); }
function nextChapter() { if(currentChapterIndex < currentChapterList.length - 1) openReader(currentChapterIndex + 1); }
function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
function closeReader() { document.getElementById('readerModal').style.display = 'none'; document.getElementById('reader').innerHTML = ''; }
function backToChapter() { document.getElementById('readerModal').style.display = 'none'; document.getElementById('detailModal').style.display = 'block'; }
document.getElementById('search').addEventListener('keypress', e => { if (e.key === 'Enter') loadManga(e.target.value); });
loadManga();
</script>
</body>
</html>
