<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wibuku KW - 23 API + Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    header { background: #1f1f1f; padding: 15px; position: sticky; top: 0; z-index: 100; }
  .container { max-width: 1200px; margin: auto; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
  .card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
  .card:hover { transform: scale(1.05); }
  .card img { width: 100%; height: 220px; object-fit: cover; }
  .card h3 { font-size: 14px; padding: 8px; height: 50px; overflow: hidden; }
  .source-tag { font-size: 10px; background: #ff4500; padding: 2px 6px; border-radius: 4px; position: absolute; margin: 5px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
  .tab { padding: 8px 16px; background: #333; border-radius: 20px; cursor: pointer; white-space: nowrap; }
  .tab.active { background: #ff4500; }
   #loader { text-align: center; padding: 40px; }

   /* Modal Detail + Reader */
  .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
  .modal-content { background: #121212; margin: 20px auto; max-width: 900px; border-radius: 10px; }
  .modal-header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  .close { font-size: 30px; cursor: pointer; }
  .detail-info { display: flex; gap: 20px; padding: 20px; }
  .detail-info img { width: 200px; border-radius: 8px; }
  .chapter-list { padding: 0 20px 20px; max-height: 300px; overflow-y: auto; }
  .chapter-item { padding: 12px; background: #1f1f1f; margin-bottom: 8px; border-radius: 5px; cursor: pointer; }
  .chapter-item:hover { background: #333; }
   #reader { background: #000; padding: 20px 0; text-align: center; }
   #reader img { max-width: 100%; margin-bottom: 5px; }
  .back-btn { background: #ff4500; border: none; padding: 10px 20px; border-radius: 5px; color: #fff; cursor: pointer; margin: 20px; }
  </style>
</head>
<body>
  <header>
    <h2>Wibuku KW 23 API + Reader</h2>
    <input type="text" id="search" placeholder="Cari manga..." style="width:100%;padding:10px;margin-top:10px;background:#333;border:none;border-radius:5px;color:#fff">
  </header>

  <div class="container">
    <div class="tabs" id="apiTabs"></div>
    <div id="loader">Loading dari 23 API...</div>
    <div class="grid" id="mangaGrid"></div>
  </div>

  <!-- Modal Detail -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detailTitle">Loading...</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- Modal Reader -->
  <div id="readerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="readerTitle">Loading Chapter...</h2>
        <span class="close" onclick="closeReader()">&times;</span>
      </div>
      <button class="back-btn" onclick="backToChapter()">← Kembali ke Chapter</button>
      <div id="reader"></div>
    </div>
  </div>

<script>
const PROXY = 'https://corsproxy.io/?'; // Buat bypass CORS
const APIS = [
  { name: "MangaDex", url: "https://api.mangadex.org/manga?limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id", type: "mangadex" },
  { name: "Jikan", url: "https://api.jikan.moe/v4/top/manga?limit=20", type: "jikan" },
  { name: "Kitsu", url: "https://kitsu.io/api/edge/manga?page[limit]=20", type: "kitsu" },
  { name: "AniList", url: "https://graphql.anilist.co", type: "anilist", method: "POST" },
  { name: "GoogleBooks", url: "https://www.googleapis.com/books/v1/volumes?q=manga&maxResults=20", type: "googlebooks" },
  { name: "OpenLibrary", url: "https://openlibrary.org/search.json?q=manga&limit=20", type: "openlibrary" },
  // Sisanya masukin sendiri, banyak yang bakal CORS error
];

const mangaGrid = document.getElementById('mangaGrid');
const loader = document.getElementById('loader');
const apiTabs = document.getElementById('apiTabs');
let allManga = [];
let currentMangaData = null;

function createTabs() {
  APIS.forEach((api, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.innerText = api.name;
    tab.onclick = () => loadSingleAPI(i);
    apiTabs.appendChild(tab);
  });
  const allTab = document.createElement('div');
  allTab.className = 'tab active';
  allTab.innerText = 'Semua API';
  allTab.onclick = () => loadAllAPI();
  apiTabs.prepend(allTab);
}

async function fetchAPI(api) {
  try {
    let url = api.url;
    // Pake proxy buat API yang CORS
    if(api.type!== 'mangadex' && api.type!== 'jikan') url = PROXY + encodeURIComponent(api.url);

    let res;
    if (api.method === 'POST') {
      res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: `{ Page(page: 1, perPage: 20) { media(type: MANGA) { id title { romaji } coverImage { large } description } } }` })
      });
    } else {
      res = await fetch(url);
    }
    const data = await res.json();
    return parseResponse(data, api.type, api.name);
  } catch (e) {
    console.log(api.name + ' error:', e);
    return [];
  }
}

function parseResponse(data, type, source) {
  let results = [];
  try {
    switch(type) {
      case 'mangadex':
        data.data.forEach(m => {
          const cover = m.relationships.find(r => r.type === 'cover_art');
          results.push({
            id: m.id,
            title: m.attributes.title.en || Object.values(m.attributes.title)[0],
            cover: `https://uploads.mangadex.org/covers/${m.id}/${cover?.attributes?.fileName}.256.jpg`,
            desc: m.attributes.description.en || 'No description',
            source: source,
            raw: m
          });
        });
        break;
      case 'jikan':
        data.data.forEach(m => {
          results.push({
            id: m.mal_id,
            title: m.title,
            cover: m.images.jpg.image_url,
            desc: m.synopsis,
            source: source,
            raw: m
          });
        });
        break;
      case 'kitsu':
        data.data.forEach(m => {
          results.push({
            id: m.id,
            title: m.attributes.canonicalTitle,
            cover: m.attributes.posterImage?.small,
            desc: m.attributes.synopsis,
            source: source,
            raw: m
          });
        });
        break;
      case 'anilist':
        data.data.Page.media.forEach(m => {
          results.push({
            id: m.id,
            title: m.title.romaji,
            cover: m.coverImage.large,
            desc: m.description,
            source: source,
            raw: m
          });
        });
        break;
      case 'googlebooks':
        data.items?.forEach(m => {
          results.push({
            id: m.id,
            title: m.volumeInfo.title,
            cover: m.volumeInfo.imageLinks?.thumbnail,
            desc: m.volumeInfo.description,
            source: source,
            raw: m
          });
        });
        break;
    }
  } catch (e) {}
  return results;
}

async function loadAllAPI() {
  loader.style.display = 'block';
  mangaGrid.innerHTML = '';
  allManga = [];
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  apiTabs.children[0].classList.add('active');

  const promises = APIS.map(api => fetchAPI(api));
  const results = await Promise.allSettled(promises);
  results.forEach(r => { if(r.status === 'fulfilled') allManga.push(...r.value) });

  renderManga(allManga);
  loader.style.display = 'none';
}

async function loadSingleAPI(index) {
  loader.style.display = 'block';
  mangaGrid.innerHTML = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  apiTabs.children[index + 1].classList.add('active');

  const result = await fetchAPI(APIS[index]);
  renderManga(result);
  loader.style.display = 'none';
}

function renderManga(list) {
  mangaGrid.innerHTML = '';
  list.forEach((m, idx) => {
    if(!m.cover ||!m.title) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="position:relative">
        <span class="source-tag">${m.source}</span>
        <img src="${m.cover}" onerror="this.src='https://via.placeholder.com/160x220?text=No+Image'">
      </div>
      <h3>${m.title}</h3>
    `;
    card.onclick = () => openDetail(m);
    mangaGrid.appendChild(card);
  });
}

async function openDetail(manga) {
  currentMangaData = manga;
  document.getElementById('detailTitle').innerText = manga.title;
  document.getElementById('detailModal').style.display = 'block';

  let html = `
    <div class="detail-info">
      <img src="${manga.cover}">
      <div>
        <p><b>Source:</b> ${manga.source}</p>
        <p style="margin-top:10px">${manga.desc? manga.desc.substring(0,300) + '...' : 'No description'}</p>
      </div>
    </div>
    <div class="chapter-list" id="chapterList"><p>Loading chapter...</p></div>
  `;
  document.getElementById('detailBody').innerHTML = html;

  // Load chapter kalau MangaDex
  if(manga.source === 'MangaDex') {
    try {
      const res = await fetch(`https://api.mangadex.org/manga/${manga.id}/feed?translatedLanguage[]=id&translatedLanguage[]=en&order[chapter]=desc&limit=100`);
      const data = await res.json();
      let chapHtml = '<h3>Daftar Chapter</h3>';
      data.data.forEach(ch => {
        const num = ch.attributes.chapter || 'Oneshot';
        const title = ch.attributes.title || '';
        chapHtml += `<div class="chapter-item" onclick="openReader('${ch.id}', 'Chapter ${num} ${title}')">Chapter ${num} ${title}</div>`;
      });
      document.getElementById('chapterList').innerHTML = chapHtml || '<p>No chapter found</p>';
    } catch(e) {
      document.getElementById('chapterList').innerHTML = '<p>Gagal load chapter</p>';
    }
  } else {
    document.getElementById('chapterList').innerHTML = '<p>Reader hanya support MangaDex untuk sekarang</p>';
  }
}

async function openReader(chapterId, chapterTitle) {
  document.getElementById('detailModal').style.display = 'none';
  document.getElementById('readerModal').style.display = 'block';
  document.getElementById('readerTitle').innerText = chapterTitle;
  document.getElementById('reader').innerHTML = '<p style="padding:40px">Loading gambar...</p>';

  try {
    const res = await fetch(`https://api.mangadex.org/at-home/server/${chapterId}`);
    const data = await res.json();
    const baseUrl = data.baseUrl;
    const hash = data.chapter.hash;
    const pages = data.chapter.data;

    let imgHtml = '';
    pages.forEach(page => {
      imgHtml += `<img src="${baseUrl}/data/${hash}/${page}" loading="lazy"><br>`;
    });
    document.getElementById('reader').innerHTML = imgHtml;
  } catch(e) {
    document.getElementById('reader').innerHTML = '<p style="padding:40px">Gagal load gambar chapter</p>';
  }
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
}
function closeReader() {
  document.getElementById('readerModal').style.display = 'none';
  document.getElementById('reader').innerHTML = '';
}
function backToChapter() {
  document.getElementById('readerModal').style.display = 'none';
  document.getElementById('detailModal').style.display = 'block';
}

// Search
document.getElementById('search').onkeyup = (e) => {
  const keyword = e.target.value.toLowerCase();
  const filtered = allManga.filter(m => m.title.toLowerCase().includes(keyword));
  renderManga(filtered);
};

createTabs();
loadAllAPI();
</script>
</body>
</html>
