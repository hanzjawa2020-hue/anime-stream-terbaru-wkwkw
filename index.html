<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeWeb</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
    nav { background: #1e1e1e; padding: 15px; margin: -20px -20px 20px; }
    nav a { color: #4CAF50; margin-right: 15px; text-decoration: none; }
   .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
   .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
   .card img { width: 100%; height: 220px; object-fit: cover; }
   .card h3 { font-size: 14px; padding: 8px; margin: 0; }
   .card p { font-size: 12px; padding: 0 8px 8px; margin: 0; color: #4CAF50; }
    input { width: 100%; padding: 10px; background: #1e1e1e; border: 1px solid #333; color: white; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="ongoing.html">Ongoing</a>
    <a href="complete.html">Complete</a>
  </nav>
  
  <h1>Cari Anime</h1>
  <input type="text" id="search" placeholder="Ketik judul anime...">
  <div id="result" class="grid"></div>

  <h1>Ongoing Terbaru</h1>
  <div id="ongoing-list" class="grid">Loading...</div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('search').addEventListener('input', async (e) => {
      if(e.target.value.length > 2) {
        const data = await getAnime(`search?q=${e.target.value}`);
        renderCards(data, 'result');
      }
    });
    getAnime('ongoing').then(data => renderCards(data.slice(0, 12), 'ongoing-list'));
  </script>
</body>
</html>
