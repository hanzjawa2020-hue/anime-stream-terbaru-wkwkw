<style>
/* ============ TOKENS ============ */
:root{
  --bg:#0A0B10;
  --bg-soft:#0E1018;
  --surface:#131522;
  --surface-2:#1A1D2C;
  --border:#262A3D;
  --border-soft:#1E2132;
  --text:#F2F3F8;
  --text-muted:#8A8FA6;
  --text-dim:#5C6079;
  --accent:#FF3B69;
  --accent-2:#33E0FF;
  --accent-3:#7C5CFF;
  --gold:#FFC857;
  --gradient: linear-gradient(135deg,#FF3B69 0%, #7C5CFF 100%);
  --gradient-soft: linear-gradient(135deg, rgba(255,59,105,.18), rgba(124,92,255,.14));
  --radius:14px;
  --radius-sm:8px;
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-lg: 0 20px 60px -20px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 15% 0%, rgba(255,59,105,.10), transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(124,92,255,.10), transparent 45%);
  pointer-events:none;
  z-index:0;
