<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOURTE Downloader Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg1:#667eea; --bg2:#764ba2; --glass:rgba(255,255,255,0.1);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;animation:gradient 8s ease infinite;background-size:200% 200%;}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:40px;max-width:650px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);color:#fff;animation:fadeIn 0.8s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;font-size:32px;font-weight:800;margin-bottom:8px}
.logo span{background:linear-gradient(90deg,#ff6b6b,#feca57);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
input{width:100%;padding:18px 20px;border:none;border-radius:15px;font-size:16px;outline:none;background:rgba(255,255,255,0.15);color:#fff}
.btn{background:linear-gradient(90deg,#ff6b6b,#feca57);color:#fff;border:none;padding:18px;width:100%;border-radius:15px;font-size:18px;font-weight:700;cursor:pointer;margin-top:15px}
.result-card{margin-top:25px;padding:25px;background:rgba(255,255,255,0.1);border-radius:20px;text-align:center}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-group a{padding:12px 20px;border-radius:10px;text-decoration:none;color:#fff;font-weight:600}
</style>
</head>
<body>
<div class="container">
    <div class="logo">FOURTE <span>DOWNLOADER</span></div>
    <input type="text" id="url" placeholder="🔗 Tempel link TikTok atau YouTube disini...">
    <button onclick="download()" class="btn">DOWNLOAD SEKARANG</button>
    <div id="result"></div>
</div>

<script>
async function download(){
    const url = document.getElementById('url').value;
    const result = document.getElementById('result');
    result.innerHTML = "Loading...";
    
    if(url.includes('tiktok.com')){
        const res = await fetch('https://api.tikwm.com/video/?url='+encodeURIComponent(url));
        const data = await res.json();
        if(data.code == 0){
            result.innerHTML = `
            <div class="result-card">
                <img src="${data.data.cover}" width="200" style="border-radius:15px">
                <h3>${data.data.title}</h3>
                <div class="btn-group">
                    <a href="${data.data.play}" style="background:#667eea">⬇️ No WM</a>
                    <a href="${data.data.music}" style="background:#48dbfb">🎵 MP3</a>
                </div>
            </div>`;
        }
    } 
    else if(url.includes('youtube.com') || url.includes('youtu.be')){
        result.innerHTML = `<div class="result-card"><p>Gunakan: https://cobalt.tools untuk YouTube di versi Github Pages</p></div>`;
    }
    else{ result.innerHTML = "<p>❌ Link tidak valid</p>"; }
}
</script>
</body>
</html>
