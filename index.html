// SPEED HACK: CACHE + PARALLEL + TIMEOUT KECIL
async function fastFetch(url, isImage = false) {
  const imgList = isImage? [...IMG_VPN_SERVERS,...IMG_PROXIES] : API_PROXIES;
  const proxyList = currentVPNIndex >= 0? [VPN_SERVERS[currentVPNIndex]] : imgList;

  if (isImage && WORKING_IMG_PROXY) {
    try {
      const res = await fetch(WORKING_IMG_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(3000) });
      if (res.ok) return res;
    } catch (e) { WORKING_IMG_PROXY = null; }
  }
  if (!isImage && WORKING_API_PROXY) {
    try {
      const res = await fetch(WORKING_API_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(3000) });
      if (res.ok) return res;
    } catch (e) { WORKING_API_PROXY = null; }
  }

  for (let i = 0; i < proxyList.length; i++) {
    const proxyIndex = currentVPNIndex >= 0? 0 : (isImage? i : currentApiProxyIndex + i) % proxyList.length;
    try {
      updateStatus(`${currentVPNIndex>=0?'VPN':isImage?'Gambar':'API'} ${i+1}/${proxyList.length}...`);
      let finalUrl = proxyList[proxyIndex];
      if (finalUrl.includes('wp.com')) finalUrl += url.replace(/^https?:\/\//, '');
      else if (finalUrl.includes('statically.io')) finalUrl += url;
      else finalUrl += encodeURIComponent(url);

      const res = await fetch(finalUrl, { signal: AbortSignal.timeout(2000) });
      if (res.ok) {
        if (isImage) WORKING_IMG_PROXY = proxyList[proxyIndex];
        else WORKING_API_PROXY = proxyList[proxyIndex];
        if (!isImage && currentVPNIndex < 0) currentApiProxyIndex = proxyIndex;
        return res;
      }
    } catch (e) {}
  }

  if (currentVPNIndex < 0 &&!isImage) {
    vpnBox.style.display = 'block';
    throw new Error('205 proxy mati. Pilih VPN di atas.');
  }
  return null;
}

async function loadManga(title = '') {
  try {
    loader.style.display = 'block'; loader.innerText = 'Perang 205 proxy...';
    mangaGrid.innerHTML = ''; vpnBox.style.display = 'none';
    let apiUrl = `https://api.mangadex.org/manga?limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en&order[followedCount]=desc&contentRating[]=safe&contentRating[]=suggestive`;
    if (title) apiUrl = `https://api.mangadex.org/manga?title=${encodeURIComponent(title)}&limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id&availableTranslatedLanguage[]=en`;

    const res = await fastFetch(apiUrl, false);
    const data = await res.json();
    if (!data.data?.length) throw new Error('Manga tidak ditemukan');

    const promises = data.data.slice(0, 20).map(async (m) => {
      try {
        const cover = m.relationships.find(r => r.type === 'cover_art');
        if (!cover?.attributes?.fileName) return null;
        const title = m.attributes.title.en || m.attributes.title['ja-ro'] || Object.values(m.attributes.title)[0] || 'No Title';
        const desc = m.attributes.description.en || m.attributes.description.id || '';
        const coverUrl = `https://uploads.mangadex.org/covers/${m.id}/${cover.attributes.fileName}.256.jpg`;
        let finalCover = WORKING_IMG_PROXY? WORKING_IMG_PROXY + encodeURIComponent(coverUrl) : 'https://via.placeholder.com/160x220/333/fff?text=Load';
        return { id: m.id, title, cover: finalCover, desc, coverUrl };
      } catch (e) { return null; }
    });

    const mangaList = (await Promise.all(promises)).filter(Boolean);
    renderManga(mangaList);
    loader.style.display = 'none';
    updateStatus(`Loaded ${mangaList.length} manga | Proxy: ${WORKING_API_PROXY?'FOUND':'SEARCHING'}`);
  } catch (e) {
    loader.innerHTML = `<div class="error"><b>KIAMAT</b><br>${e.message}<br><br>Install 1.1.1.1 VPN</div>`;
  }
}

function renderManga(list) {
  mangaGrid.innerHTML = '';
  list.forEach(m => {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<img src="${m.cover}" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/160x220/333/fff?text=Error'"><h3>${m.title}</h3>`;
    card.onclick = () => openDetail(m); mangaGrid.appendChild(card);
  });

async function openDetail(manga) {

    <div class="chapter-list" id="chapterList"><p>Loading chapter...</p></div>`;
  await loadChapters(manga.id);
}

async function loadChapters(mangaId) {
  try {
    const url = `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=id&translatedLanguage[]=en&order[chapter]=desc&limit=500`;
    const res = await fastFetch(url, false); const data = await res.json();
    if (!data.data?.length) throw new Error('No chapter');
    currentChapterList = data.data.map(ch => ({
      id: ch.id, chapter: ch.attributes.chapter || 'Oneshot',
      title: ch.attributes.title || '', lang: ch.attributes.translatedLanguage
    }));
    let chapHtml = '<h3>Pilih Chapter</h3>';
    currentChapterList.forEach((ch, idx) => {
      chapHtml += `<div class="chapter-item" onclick="openReader(${idx})"><div>Ch. ${ch.chapter} ${ch.title}</div><span>${ch.lang.toUpperCase()}</span></div>`;
    });
    document.getElementById('chapterList').innerHTML = chapHtml;
  } catch(e) {
    document.getElementById('chapterList').innerHTML = '<p>Gagal load chapter.</p>';
  }
}

async function openReader(index) {
  currentChapterIndex = index; const ch = currentChapterList[index];
  document.getElementById('detailModal').style.display = 'none';
  document.getElementById('readerModal').style.display = 'block';
  document.getElementById('readerTitle').innerText = `Ch. ${ch.chapter} - ${ch.title}`;
  document.getElementById('reader').innerHTML = '<p style="padding:40px">Loading kilat...</p>';
  try {
    const res = await fastFetch(`https://api.mangadex.org/at-home/server/${ch.id}`, false);
    const data = await res.json();
    let imgHtml = '';
    for (const page of data.chapter.dataSaver) {
      const imgUrl = `${data.baseUrl}/data-saver/${data.chapter.hash}/${page}`;
      const proxiedUrl = WORKING_IMG_PROXY? WORKING_IMG_PROXY + encodeURIComponent(imgUrl) : imgUrl;
      imgHtml += `<img src="${proxiedUrl}" loading="lazy" referrerpolicy="no-referrer">`;
    }
    document.getElementById('reader').innerHTML = imgHtml; window.scrollTo(0, 0);
    if (preloadEnabled && index < currentChapterList.length - 1) setTimeout(() => preloadNextChapter(index + 1), 2000);
    updateStatus('');
  } catch(e) {
    document.getElementById('reader').innerHTML = '<p style="padding:40px">Gagal. Coba VPN lain</p>';
  }
}

async function preloadNextChapter(nextIndex) {
  try {
    const ch = currentChapterList[nextIndex];
    const res = await fastFetch(`https://api.mangadex.org/at-home/server/${ch.id}`, false);
    const data = await res.json();
    for (let i = 0; i < Math.min(3, data.chapter.dataSaver.length); i++) {
      const imgUrl = `${data.baseUrl}/data-saver/${data.chapter.hash}/${data.chapter.dataSaver[i]}`;
      const img = new Image(); img.src = WORKING_IMG_PROXY? WORKING_IMG_PROXY + encodeURIComponent(imgUrl) : imgUrl;
    }
    updateStatus(`Next chapter preloaded`);
  } catch (e) {}
}
