<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream WKWKW - Anime & Manga 23 API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    header { background: #1f1f1f; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.main-tabs { display: flex; gap: 10px; }
.main-tab { padding: 10px 20px; background: #333; border-radius: 8px; cursor: pointer; font-weight: bold; }
.main-tab.active { background: #ff4500; }
.content { display: none; }
.content.active { display: block; }
.container { max-width: 1200px; margin: auto; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
.card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
.card:hover { transform: scale(1.05); }
.card img { width: 100%; height: 220px; object-fit: cover; }
.card h3 { font-size: 14px; padding: 8px; height: 50px; overflow: hidden; }
.source-tag { font-size: 10px; background: #ff4500; padding: 2px 6px; border-radius: 4px; position: absolute; margin: 5px; top: 0; left: 0; }
.badge-read { background: #00c853; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.tab { padding: 8px 16px; background: #333; border-radius: 20px; cursor: pointer; white-space: nowrap; }
.tab.active { background: #ff4500; }
  #loader { text-align: center; padding: 40px; }
.modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
.modal-content { background: #121212; margin: 20px auto; max-width: 900px; border-radius: 10px; }
.modal-header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
.close { font-size: 30px; cursor: pointer; }
.detail-info { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
.detail-info img { width: 200px; border-radius: 8px; }
.chapter-list { padding: 0 20px 20px; max-height: 300px; overflow-y: auto; }
.chapter-item { padding: 12px; background: #1f1f1f; margin-bottom: 8px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; }
.chapter-item:hover { background: #333; }
  #reader { background: #000; padding: 20px 0; text-align: center; }
  #reader img { max-width: 100%; margin-bottom: 5px; }
.btn { background: #ff4500; border: none; padding: 10px 20px; border-radius: 5px; color: #fff; cursor: pointer; margin: 5px; }
.reader-controls { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
  #search { width: 100%; padding: 10px; margin-bottom: 20px; background: #333; border: none; border-radius: 5px; color: #fff; }
.video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h2>Stream WKWKW</h2>
    <div class="main-tabs">
      <div class="main-tab active" onclick="switchTab('anime')">Anime</div>
      <div class="main-tab" onclick="switchTab('manga')">Manga</div>
    </div>
  </header>

  <div id="animeContent" class="content active">
    <div class="container">
      <h3>Streaming Anime Terbaru</h3>
      <div class="grid">
        <div class="card" onclick="playAnime('https://www.youtube.com/embed/dQw4w9WgXcQ','One Piece Eps 1000')">
          <img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">
          <h3>One Piece Eps 1000</h3>
        </div>
      </div>
    </div>
  </div>

  <div id="mangaContent" class="content">
    <div class="container">
      <input type="text" id="search" placeholder="Cari manga...">
      <div class="tabs" id="apiTabs"></div>
      <div id="loader">Loading dari 23 API...</div>
      <div class="grid" id="mangaGrid"></div>
    </div>
  </div>

  <div id="animeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="animeTitle">Player</h2>
        <span class="close" onclick="closeAnime()">&times;</span>
      </div>
      <div class="video-container">
        <iframe id="animePlayer" src="" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detailTitle">Loading...</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <div id="readerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="readerTitle">Loading Chapter...</h2>
        <span class="close" onclick="closeReader()">&times;</span>
      </div>
      <div class="reader-controls">
        <button class="btn" onclick="prevChapter()">← Prev</button>
        <button class="btn" onclick="backToChapter()">Daftar Chapter</button>
        <button class="btn" onclick="nextChapter()">Next →</button>
        <button class="btn" onclick="downloadChapter()" style="background:#00c853">Download</button>
      </div>
      <div id="reader"></div>
    </div>
  </div>

<script>
// GANTI TAB ANIME/MANGA
function switchTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Content').classList.add('active');
}

function playAnime(url, title) {
  document.getElementById('animeTitle').innerText = title;
  document.getElementById('animePlayer').src = url;
  document.getElementById('animeModal').style.display = 'block';
}
function closeAnime() {
  document.getElementById('animeModal').style.display = 'none';
  document.getElementById('animePlayer').src = '';
}

// PROXY BERLAPIS - AUTO FAILOVER
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://thingproxy.freeboard.io/fetch/',
  'https://api.codetabs.com/v1/proxy?quest='
];
let currentProxyIndex = 0;

async function fetchWithProxy(url, options = {}) {
  let lastError;
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyIndex = (currentProxyIndex + i) % PROXIES.length;
    const proxyUrl = PROXIES[proxyIndex] + encodeURIComponent(url);
    try {
      const res = await fetch(proxyUrl, options);
      if (!res.ok) throw new Error('Bad response');
      currentProxyIndex = proxyIndex;
      return res;
    } catch (e) {
      lastError = e;
      console.log(`Proxy ${PROXIES[proxyIndex]} gagal, coba berikutnya...`);
    }
  }
  throw lastError;
}

// 23 API + STATUS BISA BACA
const APIS = [
  { name: "MangaDex", url: "https://api.mangadex.org/manga?limit=20&includes[]=cover_art&availableTranslatedLanguage[]=id", type: "mangadex", readable: true },
  { name: "Jikan", url: "https://api.jikan.moe/v4/top/manga?limit=20", type: "jikan", readable: false },
  { name: "Kitsu", url: "https://kitsu.io/api/edge/manga?page[limit]=20", type: "kitsu", readable: false },
  { name: "AniList", url: "https://graphql.anilist.co", type: "anilist", method: "POST", readable: false },
  { name: "GoogleBooks", url: "https://www.googleapis.com/books/v1/volumes?q=manga&maxResults=20", type: "googlebooks", readable: false },
  { name: "OpenLibrary", url: "https://openlibrary.org/search.json?q=manga&limit=20", type: "openlibrary", readable: false },
  { name: "MangaFox", url: "https://mangafox-api.vercel.app/popular", type: "mangafox", readable: true, base: "https://mangafox-api.vercel.app" },
  { name: "MangaHere", url: "https://manga-here-api.vercel.app/popular", type: "mangahere", readable: true, base: "https://manga-here-api.vercel.app" },
  { name: "ReadManga", url: "https://readmanga-api.vercel.app/popular", type: "readmanga", readable: true, base: "https://readmanga-api.vercel.app" },
  { name: "MangaHub", url: "https://mangahub-api.vercel.app/popular", type: "mangahub", readable: true, base: "https://mangahub-api.vercel.app" },
  { name: "AsuraScans", url: "https://asura-api.vercel.app/popular", type: "asura", readable: true, base: "https://asura-api.vercel.app" },
  { name: "FlameScans", url: "https://flamescans-api.vercel.app/popular", type: "flame", readable: true, base: "https://flamescans-api.vercel.app" },
  { name: "ReaperScans", url: "https://reaper-scans.com/api/popular", type: "reaper", readable: true, base: "https://reaper-scans.com/api" },
  { name: "Luminous", url: "https://luminousscans.com/api/popular", type: "luminous", readable: true, base: "https://luminousscans.com/api" },
  { name: "Mangakakalot", url: "https://mangakakalot-api.vercel.app/popular", type: "mangakakalot", readable: true, base: "https://mangakakalot-api.vercel.app" },
  { name: "MangaUpdates", url: "https://api.mangaupdates.com/v1/releases", type: "mangaupdates", readable: false },
  { name: "RoyalRoad", url: "https://royalroad-api.vercel.app/popular", type: "royalroad", readable: true, base: "https://royalroad-api.vercel.app" },
  { name: "ScribbleHub", url: "https://scribblehub-api.vercel.app/popular", type: "scribble", readable: false },
  { name: "NovelUpdates", url: "https://www.novelupdates.com/api/popular", type: "novelupdates", readable: false },
  { name: "WuxiaWorld", url: "https://wuxiaworld-api.vercel.app/popular", type: "wuxia", readable: false },
  { name: "MyAnimeList", url: "https://mal-api.vercel.app/top/manga", type: "mal", readable: false },
  { name: "TraceMoe", url: "https://api.trace.moe/search", type: "tracemoe", readable: false },
  { name: "ComicVine", url: "https://comicvine.gamespot.com/api/volumes/?api_key=YOUR_KEY&format=json&limit=20", type: "comicvine", readable: false }
];

const mangaGrid = document.getElementById('mangaGrid');
const loader = document.getElementById('loader');
const apiTabs = document.getElementById('apiTabs');
let allManga = [];
let currentChapterList = [];
let currentChapterIndex = 0;
let currentMangaData = null;

function createTabs() {
  APIS.forEach((api, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.innerText = api.name;
    tab.onclick = () => loadSingleAPI(i);
    apiTabs.appendChild(tab);
  });
  const allTab = document.createElement('div');
  allTab.className = 'tab active';
  allTab.innerText = 'Semua API';
  allTab.onclick = () => loadAllAPI();
  apiTabs.prepend(allTab);
}

async function fetchAPI(api) {
  try {
    let url = api.url;
    let res;
    if (api.method === 'POST') {
      res = await fetchWithProxy(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: `{ Page(page: 1, perPage: 20) { media(type: MANGA) { id title { romaji } coverImage { large } description } }` })
      });
    } else {
      if (api.type === 'mangadex') res = await fetch(url);
      else res = await fetchWithProxy(url);
    }
    const data = await res.json();
    return parseResponse(data, api);
  } catch (e) {
    console.log(api.name + ' error:', e);
    return [];
  }
}

function parseResponse(data, api) {
  let results = [];
  try {
    switch(api.type) {
      case 'mangadex':
        data.data.forEach(m => {
          const cover = m.relationships.find(r => r.type === 'cover_art');
          results.push({
            id: m.id,
            title: m.attributes.title.en || Object.values(m.attributes.title)[0],
            cover: `https://uploads.mangadex.org/covers/${m.id}/${cover?.attributes?.fileName}.256.jpg`,
            desc: m.attributes.description.en || 'No description',
            source: api.name,
            readable: true,
            api: api
          });
        });
        break;
      case 'jikan':
        data.data.forEach(m => {
          results.push({
            id: m.mal_id,
            title: m.title,
            cover: m.images.jpg.image_url,
            desc: m.synopsis,
            source: api.name,
            readable: false,
            api: api
          });
        });
        break;
      case 'kitsu':
        data.data.forEach(m => {
          results.push({
            id: m.id,
            title: m.attributes.canonicalTitle,
            cover: m.attributes.posterImage?.small,
            desc: m.attributes.synopsis,
            source: api.name,
            readable: false,
            api: api
          });
        });
        break;
      case 'anilist':
        data.data.Page.media.forEach(m => {
          results.push({
            id: m.id,
            title: m.title.romaji,
            cover: m.coverImage.large,
            desc: m.description,
            source: api.name,
            readable: false,
            api: api
          });
        });
        break;
      case 'googlebooks':
        data.items?.forEach(m => {
          results.push({
            id: m.id,
            title: m.volumeInfo.title,
            cover: m.volumeInfo.imageLinks?.thumbnail,
            desc: m.volumeInfo.description,
            source: api.name,
            readable: false,
            api: api
          });
        });
        break;
      default:
        if (data.data) data.data.forEach(m => {
          results.push({
            id: m.id || m.slug || m.manga_id,
            title: m.title || m.name || 'Unknown',
            cover: m.image || m.cover || m.thumbnail || 'https://via.placeholder.com/160x220?text=No+Image',
            desc: m.description || m.synopsis || '',
            source: api.name,
            readable: api.readable,
            api: api,
            slug: m.slug || m.id
          });
        });
    }
  } catch (e) { console.log('Parse error:', e) }
  return results;
}

async function loadAllAPI() {
  loader.style.display = 'block';
  mangaGrid.innerHTML = '';
  allManga = [];
  document.querySelectorAll('#apiTabs.tab').forEach(t => t.classList.remove('active'));
  apiTabs.children[0].classList.add('active');

  const promises = APIS.map(api => fetchAPI(api));
  const results = await Promise.allSettled(promises);
  results.forEach(r => { if(r.status === 'fulfilled') allManga.push(...r.value) });

  renderManga(allManga);
  loader.style.display = 'none';
}

async function loadSingleAPI(index) {
  loader.style.display = 'block';
  mangaGrid.innerHTML = '';
  document.querySelectorAll('#apiTabs.tab').forEach(t => t.classList.remove('active'));
  apiTabs.children[index + 1].classList.add('active');

  const result = await fetchAPI(APIS[index]);
  renderManga(result);
  loader.style.display = 'none';
}

function renderManga(list) {
  mangaGrid.innerHTML = '';
  list.forEach((m) => {
    if(!m.cover ||!m.title) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="source-tag ${m.readable? 'badge-read' : ''}">${m.source}</span>
      <img src="${m.cover}" onerror="this.src='https://via.placeholder.com/160x220?text=No+Image'">
      <h3>${m.title}</h3>
    `;
    card.onclick = () => openDetail(m);
    mangaGrid.appendChild(card);
  });
  if(list.length === 0) mangaGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Gagal load data. Coba tab API lain.</p>';
}

async function openDetail(manga) {
  currentMangaData = manga;
  document.getElementById('detailTitle').innerText = manga.title;
  document.getElementById('detailModal').style.display = 'block';

  let html = `
    <div class="detail-info">
      <img src="${manga.cover}">
      <div>
        <p><b>Source:</b> ${manga.source}</p>
        <p style="margin-top:10px">${manga.desc? manga.desc.substring(0,300).replace(/<[^>]*>/g, '') + '...' : 'No description'}</p>
      </div>
    </div>
    <div class="chapter-list" id="chapterList"><p>Loading chapter...</p></div>
  `;
  document.getElementById('detailBody').innerHTML = html;

  if(manga.readable) {
    await loadChapters(manga);
  } else {
    document.getElementById('chapterList').innerHTML = `
      <p>Source <b>${manga.source}</b> cuma info metadata, tidak ada chapter.</p>
      <a href="https://mangadex.org/search?q=${encodeURIComponent(manga.title)}" target="_blank">
        <button class="btn">Cari di MangaDex</button>
      </a>
    `;
  }
}

async function loadChapters(manga) {
  const api = manga.api;
  let chapHtml = '<h3>Daftar Chapter</h3>';
  currentChapterList = [];

  try {
    if(api.type === 'mangadex') {
      const res = await fetch(`https://api.mangadex.org/manga/${manga.id}/feed?translatedLanguage[]=id&translatedLanguage[]=en&order[chapter]=desc&limit=500`);
      const data = await res.json();
      if(data.data.length === 0) throw 'No chapter';
      currentChapterList = data.data.map(ch => ({
        id: ch.id,
        title: `Chapter ${ch.attributes.chapter || 'Oneshot'} ${ch.attributes.title || ''} [${ch.attributes.translatedLanguage}]`,
        apiType: api.type
      }));
    } else if(api.readable && api.base) {
      const res = await fetchWithProxy(`${api.base}/manga/${manga.slug || manga.id}`);
      const data = await res.json();
      if(!data.chapters || data.chapters.length === 0) throw 'No chapter';
      currentChapterList = data.chapters.map(ch => ({
        id: ch.id || ch.chapter_id,
        title: `Chapter ${ch.chapter || ch.number}`,
        apiType: api.type,
        mangaSlug: manga.slug || manga.id
      }));
    }

    currentChapterList.forEach((ch, idx) => {
      chapHtml += `<div class="chapter-item" onclick="openReader(${idx})">
        <span>${ch.title}</span>
      </div>`;
    });
    document.getElementById('chapterList').innerHTML = chapHtml;
  } catch(e) {
    document.getElementById('chapterList').innerHTML = '<p>Gagal load chapter. API mungkin down.</p>';
  }
}

async function openReader(index) {
  currentChapterIndex = index;
  const ch = currentChapterList[index];
  document.getElementById('detailModal').style.display = 'none';
  document.getElementById('readerModal').style.display = 'block';
  document.getElementById('readerTitle').innerText = ch.title;
  document.getElementById('reader').innerHTML = '<p style="padding:40px">Loading gambar...</p>';

  try {
    let imgHtml = '';
    if(ch.apiType === 'mangadex') {
      const res = await fetch(`https://api.mangadex.org/at-home/server/${ch.id}`);
      const data = await res.json();
      const baseUrl = data.baseUrl;
      const hash = data.chapter.hash;
      data.chapter.data.forEach(page => {
        imgHtml += `<img src="${baseUrl}/data/${hash}/${page}" loading="lazy">`;
      });
    } else {
      const api = APIS.find(a => a.type === ch.apiType);
      const res = await fetchWithProxy(`${api.base}/chapter/${ch.id}`);
      const data = await res.json();
      if(!data.images || data.images.length === 0) throw 'No images';
      data.images.forEach(img => {
        imgHtml += `<img src="${PROXIES[currentProxyIndex] + encodeURIComponent(img)}" loading="lazy">`;
      });
    }
    document.getElementById('reader').innerHTML = imgHtml || '<p>Gagal load gambar</p>';
  } catch(e) {
    document.getElementById('reader').innerHTML = '<p style="padding:40px">Gagal load gambar chapter. Server API down.</p>';
  }
}

function prevChapter() {
  if(currentChapterIndex > 0) openReader(currentChapterIndex - 1);
}
function nextChapter() {
  if(currentChapterIndex < currentChapterList.length - 1) openReader(currentChapterIndex + 1);
}
function downloadChapter() {
  const images = document.querySelectorAll('#reader img');
  images.forEach((img, i) => {
    const a = document.createElement('a');
    a.href = img.src;
    a.download = `page_${i+1}.jpg`;
    a.click();
  });
  alert('Download dimulai. Cek folder Download.');
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
}
function closeReader() {
  document.getElementById('readerModal').style.display = 'none';
  document.getElementById('reader').innerHTML = '';
}
function backToChapter() {
  document.getElementById('readerModal').style.display = 'none';
  document.getElementById('detailModal').style.display = 'block';
}

document.getElementById('search').onkeyup = (e) => {
  const keyword = e.target.value.toLowerCase();
  const filtered = allManga.filter(m => m.title.toLowerCase().includes(keyword));
  renderManga(filtered);
};

createTabs();
loadAllAPI();
</script>
</body>
</html>
